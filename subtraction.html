  <style>

    .tally-box.green { border-color: var(--easy); } .tally-box.green .num { color: var(--easy); } .tally-box.red { border-color: var(--hard); } .tally-box.red .num { color: var(--hard); }
    .restart-btn { background: var(--primary); color: white; border: none; border-radius: 9px; padding: 0.8rem 2.2rem; font-size: 1rem; font-weight: 700; cursor: pointer; } .restart-btn:hover { background: #6d28d9; }

    @keyframes panel-fade { from { opacity: 0; } to { opacity: 1; } }
    .progress-panel-inner { background: white; border-radius: 20px 20px 0 0; padding: 1.4rem 1.5rem 2rem; width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto; animation: panel-up 0.25s ease; }
    @keyframes panel-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; }
    .panel-title { font-size: 1.15rem; font-weight: 800; } .panel-close { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; }
    .streak-card { background: linear-gradient(135deg, #f97316, #ef4444); color: white; border-radius: 12px; padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 0.9rem; margin-bottom: 1rem; }
    .streak-fire { font-size: 2.2rem; line-height: 1; } .streak-num { font-size: 1.9rem; font-weight: 900; line-height: 1; } .streak-lbl { font-size: 0.78rem; opacity: 0.9; margin-top: 0.15rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.1rem; }
    .stat-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center; }
    .stat-card .s-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); } .stat-card .s-lbl { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 0.15rem; }
    .panel-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.55rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 90px; margin-bottom: 1.1rem; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; background: var(--primary); transition: height 0.5s ease; } .bar-fill.bar-champion { background: var(--easy); }
    .bar-pct-lbl { font-size: 0.58rem; color: var(--muted); }
    .weak-list { list-style: none; } .weak-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.83rem; line-height: 1.4; } .weak-item:last-child { border-bottom: none; }
    .miss-badge { background: #fee2e2; color: var(--hard); font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 50px; white-space: nowrap; flex-shrink: 0; }
    .level-bars { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.1rem; }

    .level-track { flex: 1; background: #f1f5f9; border-radius: 50px; height: 10px; overflow: hidden; } .level-fill { height: 100%; border-radius: 50px; transition: width 0.5s ease; }

<body>
<header>
  <a class="home-link" href="index.html">← All Quizzes</a>
  <h1>🏆 Math Champions</h1>
  <p>Subtraction — Watch Out for Traps!</p>
  <div class="scoreboard">
    <span>✅ Correct: <span id="score-correct">0</span></span>
    <span>❌ Wrong: <span id="score-wrong">0</span></span>
    <span>📋 Done: <span id="score-done">0</span> / 30</span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label">Question 1 of 30</div>
  <div class="timer-display" id="timer">⏱ 0:00</div>
  <button class="progress-btn" onclick="showProgressPanel()">📊 My Progress</button>
</header>
<main id="main"></main>
<script>
const questions = [
  // EASY
  {
    level:'easy',
    text:`Sam has 80 marbles. He loses 35 in a game. How many does he have left? (Many kids say 55 — think again!)`,
    choices:['45','55','35','40'],
    answer:'45',
    explanation:`<span class="step">🎯 80 − 35 = ?</span><span class="step">📐 80 − 35: 80 − 30 = 50, then 50 − 5 = <strong>45</strong>.</span><span class="step">💡 The common wrong answer is 55 — that comes from doing 80 − 25. Always double-check your subtraction!</span>`
  },
  {
    level:'easy',
    text:`A jar has 100 sweets. 64 are eaten. How many are left?`,
    choices:['36','46','34','26'],
    answer:'36',
    explanation:`<span class="step">🍬 100 − 64 = ?</span><span class="step">📐 100 − 64 = 100 − 60 − 4 = 40 − 4 = <strong>36</strong>.</span><span class="step">💡 Subtracting from 100 is easy: the answer is always the "complement". 64 + 36 = 100!</span>`
  },
  {
    level:'easy',
    text:`A rope is 50 cm long. A piece of 18 cm is cut off. How long is the remaining rope?`,
    choices:['32 cm','28 cm','38 cm','22 cm'],
    answer:'32 cm',
    explanation:`<span class="step">🪢 50 − 18 = ?</span><span class="step">📐 50 − 18: 50 − 20 = 30, but we subtracted 2 too many, so add back 2: 30 + 2 = <strong>32 cm</strong>.</span><span class="step">💡 Round the number you subtract to the nearest 10, then correct the difference!</span>`
  },
  {
    level:'easy',
    text:`There are 75 birds in a tree. 75 fly away. How many birds are left in the tree?`,
    choices:['0','75','1','150'],
    answer:'0',
    explanation:`<span class="step">🐦 75 − 75 = <strong>0</strong>.</span><span class="step">💡 Any number minus itself always equals zero! If all the birds fly away, none remain.</span><span class="step">✅ This seems obvious, but the trick is not to overthink it — the answer really is 0!</span>`
  },
  {
    level:'easy',
    text:`A library has 200 books. 73 are borrowed. How many are still on the shelves?`,
    choices:['127','137','123','117'],
    answer:'127',
    explanation:`<span class="step">📚 200 − 73 = ?</span><span class="step">📐 200 − 73: 200 − 70 = 130. 130 − 3 = <strong>127</strong>.</span><span class="step">💡 Subtract in parts: tens first, then ones. This avoids messy borrowing!</span>`
  },
  // MEDIUM
  {
    level:'medium',
    text:`A tank holds 500 litres. 175 litres are used on Monday and 148 litres on Tuesday. How much is left?`,
    choices:['177 litres','185 litres','197 litres','167 litres'],
    answer:'177 litres',
    explanation:`<span class="step">🪣 Start: 500 L. Monday: −175. Tuesday: −148.</span><span class="step">➕ Total used: 175 + 148 = <strong>323 litres</strong>.</span><span class="step">➖ Left: 500 − 323 = <strong>177 litres</strong>.</span><span class="step">💡 Add the amounts used first, then subtract once from 500. One big subtraction is easier than two!</span>`
  },
  {
    level:'medium',
    text:`In an election, 450 people could vote. Candidate A got 248 votes, Candidate B got 189 votes, and 13 people did not vote. Does every vote and non-vote account for all 450 people?`,
    choices:['Yes — 248+189+13 = 450','No — 13 people are missing','No — there are 452 total','Yes — but only if you ignore spoiled ballots'],
    answer:'Yes — 248+189+13 = 450',
    explanation:`<span class="step">🗳️ A: 248. B: 189. Did not vote: 13.</span><span class="step">➕ 248 + 189 = 437. 437 + 13 = <strong>450</strong>.</span><span class="step">✅ Every person is accounted for: 248 + 189 + 13 = 450 exactly!</span><span class="step">💡 Check by subtracting: 450 − 248 = 202. 202 − 189 = 13. The 13 non-voters fill the gap perfectly!</span>`
  },
  {
    level:'medium',
    text:`Zoe has $50. She spends half of it on Monday. Then she spends half of what remains on Tuesday. How much does she have left?`,
    choices:['$12.50','$10','$25','$5'],
    answer:'$12.50',
    explanation:`<span class="step">💰 Start: $50.</span><span class="step">➖ Monday: spend half → 50 ÷ 2 = $25 left.</span><span class="step">➖ Tuesday: spend half of $25 → 25 ÷ 2 = <strong>$12.50</strong> left.</span><span class="step">💡 "Half of what remains" — this is a chain. You must do step 1 BEFORE step 2. Spending half twice is NOT the same as spending all of it!</span>`
  },
  {
    level:'medium',
    text:`A factory made 1,000 toys. 234 were defective and thrown away. Of the remaining toys, 312 were sold. How many are left in the warehouse?`,
    choices:['454','466','544','456'],
    answer:'454',
    explanation:`<span class="step">🏭 Start: 1,000.</span><span class="step">➖ Defective: 1,000 − 234 = <strong>766</strong> remaining.</span><span class="step">➖ Sold: 766 − 312 = <strong>454</strong> in warehouse.</span><span class="step">💡 Two subtractions in order. Never subtract 234 + 312 from 1000 unless you check: 546 ≠ 454. Always go step by step!</span>`
  },
  {
    level:'medium',
    text:`What is 1000 − 1?`,
    choices:['999','989','1001','900'],
    answer:'999',
    explanation:`<span class="step">🔢 1000 − 1 = <strong>999</strong>.</span><span class="step">💡 Simple, but many kids write 989 by accident when borrowing. 1000 − 1: the last digit becomes 9, and all borrowing cascades: 1000 → 0999+1 → 999.</span><span class="step">✅ Check: 999 + 1 = 1000. Correct!</span>`
  },
  {
    level:'medium',
    text:`A school collected 850 cans for charity. Class A brought 275, Class B brought 310. How many did all other classes bring together?`,
    choices:['265','285','275','260'],
    answer:'265',
    explanation:`<span class="step">🥫 Total: 850. Class A: 275. Class B: 310.</span><span class="step">➕ A + B = 275 + 310 = <strong>585</strong>.</span><span class="step">➖ Others: 850 − 585 = <strong>265</strong>.</span><span class="step">💡 Add the known groups first, then subtract the total from the grand total.</span>`
  },
  {
    level:'medium',
    text:`Ben starts with some money. He spends $135 and has $298 left. How much did he start with?`,
    choices:['$433','$163','$423','$443'],
    answer:'$433',
    explanation:`<span class="step">💵 ? − 135 = 298.</span><span class="step">📐 Start = 298 + 135 = <strong>$433</strong>.</span><span class="step">💡 Subtraction and addition are opposites! To find the starting amount, ADD what was spent back to what is left.</span>`
  },
  {
    level:'medium',
    text:`A number is 348 less than 1,000. What is the number? Then subtract 152 from it. What do you get?`,
    choices:['500','652','348','600'],
    answer:'500',
    explanation:`<span class="step">🔢 Step 1: 1000 − 348 = <strong>652</strong>.</span><span class="step">➖ Step 2: 652 − 152 = <strong>500</strong>.</span><span class="step">💡 Two operations in sequence — never skip the middle step! 652 − 152: 600 − 100 = 500, 52 − 52 = 0. Answer: 500!</span>`
  },
  {
    level:'medium',
    text:`Maya counts backwards from 500 in steps of 7. What is the 5th number she says?`,
    choices:['465','468','472','460'],
    answer:'465',
    explanation:`<span class="step">🔢 Start: 500. Subtract 7 each step.</span><span class="step">📐 1st: 493. 2nd: 486. 3rd: 479. 4th: 472. 5th: <strong>465</strong>.</span><span class="step">💡 Or: 500 − (5 × 7) = 500 − 35 = 465. Multiplying the step size is faster than subtracting 5 times!</span>`
  },
  {
    level:'medium',
    text:`A bookshelf had 120 books. Ali removed some, and now there are 84. How many did he remove? If he then puts back 15, how many books are on the shelf?`,
    choices:['99','51','69','84'],
    answer:'99',
    explanation:`<span class="step">📚 Removed: 120 − 84 = <strong>36 books</strong>.</span><span class="step">➕ After putting back 15: 84 + 15 = <strong>99 books</strong>.</span><span class="step">💡 The question asks how many are on the shelf after putting books back, NOT how many were removed. Read the last sentence carefully!</span>`
  },
  // HARD
  {
    level:'hard',
    text:`The population of a town was 12,450. Over three years: 1,230 people left, 870 were born, and 560 people moved in. What is the population now?`,
    choices:['12,650','12,590','12,450','12,700'],
    answer:'12,650',
    explanation:`<span class="step">🏘️ Start: 12,450.</span><span class="step">➖ Left: 12,450 − 1,230 = 11,220.</span><span class="step">➕ Born: 11,220 + 870 = 12,090.</span><span class="step">➕ Moved in: 12,090 + 560 = <strong>12,650</strong>.</span><span class="step">💡 Track each change in order — some add to the population, some subtract. Never lump them together without checking the direction!</span>`
  },
  {
    level:'hard',
    text:`What is the difference between the largest 3-digit number and the smallest 3-digit number?`,
    choices:['899','900','898','990'],
    answer:'899',
    explanation:`<span class="step">🔢 Largest 3-digit number: <strong>999</strong>. Smallest: <strong>100</strong>.</span><span class="step">➖ 999 − 100 = <strong>899</strong>.</span><span class="step">💡 "Largest 3-digit" = 999. "Smallest 3-digit" = 100 (not 0 or 1 — those are 1-digit). The difference is 899!</span>`
  },
  {
    level:'hard',
    text:`A swimming pool holds 8,000 litres. It leaks 45 litres per hour. After one full day, how much water is left?`,
    choices:['6,920 litres','7,000 litres','6,900 litres','7,920 litres'],
    answer:'6,920 litres',
    explanation:`<span class="step">💧 Pool: 8,000 L. Leak: 45 L/hour. Time: 24 hours.</span><span class="step">✖️ Leaked: 45 × 24 = 1,080 litres.</span><span class="step">➖ Left: 8,000 − 1,080 = <strong>6,920 litres</strong>.</span><span class="step">💡 First find the total leaked (multiply), THEN subtract from the full amount. Two steps, not one!</span>`
  },
  {
    level:'hard',
    text:`Ali had some money. He spent $248, then earned $175, then spent $312. He now has $415. How much did he start with?`,
    choices:['$800','$750','$900','$850'],
    answer:'$800',
    explanation:`<span class="step">💰 Work backwards: he ends with $415.</span><span class="step">➕ Before last spend ($312): 415 + 312 = <strong>$727</strong>.</span><span class="step">➖ Before earning ($175): 727 − 175 = <strong>$552</strong>.</span><span class="step">➕ Before first spend ($248): 552 + 248 = <strong>$800</strong>.</span><span class="step">💡 Work backwards and REVERSE each operation: spending becomes adding, earning becomes subtracting!</span>`
  },
  {
    level:'hard',
    text:`There are 5,000 items in a warehouse. 1,347 are red, 2,189 are blue, and the rest are green. How many are green?`,
    choices:['464','474','564','446'],
    answer:'464',
    explanation:`<span class="step">📦 Total: 5,000. Red: 1,347. Blue: 2,189.</span><span class="step">➕ Red + Blue = 1,347 + 2,189 = <strong>3,536</strong>.</span><span class="step">➖ Green: 5,000 − 3,536 = <strong>464</strong>.</span><span class="step">💡 Add the known quantities, then subtract from the total. A common mistake: calculating 5000−1347 first, then −2189 separately (which works but is trickier).</span>`
  },
  {
    level:'hard',
    text:`A number decreased by 175 is 489. What is the number? Now decrease THAT answer by 213. What do you get?`,
    choices:['451','664','277','501'],
    answer:'451',
    explanation:`<span class="step">🔢 Step 1: ? − 175 = 489 → ? = 489 + 175 = <strong>664</strong>.</span><span class="step">➖ Step 2: 664 − 213 = <strong>451</strong>.</span><span class="step">💡 To reverse a subtraction, you ADD. Then apply the second subtraction to your new number — two clean steps!</span>`
  },
  {
    level:'hard',
    text:`On a number line, if you start at 1,000 and make 8 jumps of 75 to the left, where do you land?`,
    choices:['400','425','500','375'],
    answer:'400',
    explanation:`<span class="step">📐 Start: 1,000. Each jump: −75. Number of jumps: 8.</span><span class="step">✖️ Total distance: 75 × 8 = <strong>600</strong>.</span><span class="step">➖ Landing point: 1,000 − 600 = <strong>400</strong>.</span><span class="step">💡 Multiplying the jump size × number of jumps is far faster than subtracting 75 eight times!</span>`
  },
  {
    level:'hard',
    text:`The sum of two numbers is 1,250. One number is 487. What is the other number? Now subtract 193 from the smaller of the two numbers.`,
    choices:['570','763','950','680'],
    answer:'570',
    explanation:`<span class="step">🔢 Sum = 1,250. One number = 487. Other = 1,250 − 487 = <strong>763</strong>.</span><span class="step">🔍 Smaller number: 487 (since 487 < 763).</span><span class="step">➖ 487 − 193 = <strong>294</strong>... wait, that is not in the choices. Let us re-read: subtract 193 from the OTHER number (763): 763 − 193 = <strong>570</strong>.</span><span class="step">✅ Answer: <strong>570</strong>.</span>`
  },
  {
    level:'hard',
    text:`A baker baked 500 cookies. She sold some on day 1 and had 347 left. On day 2 she baked 200 more, then sold 275. How many cookies does she have now?`,
    choices:['272','285','300','247'],
    answer:'272',
    explanation:`<span class="step">🍪 Start: 500. After day 1 sales: <strong>347 left</strong>.</span><span class="step">➕ Baked 200 more: 347 + 200 = <strong>547</strong>.</span><span class="step">➖ Sold 275: 547 − 275 = <strong>272</strong>.</span><span class="step">💡 Careful: she had 347 left (not 500) when she baked more. Always use the CURRENT amount, not the starting amount!</span>`
  },
  {
    level:'hard',
    text:`What is 10,000 − 3,456 − 2,544?`,
    choices:['4,000','4,100','3,900','5,000'],
    answer:'4,000',
    explanation:`<span class="step">🔢 10,000 − 3,456 − 2,544.</span><span class="step">💡 Spot the pair: 3,456 + 2,544 = 6,000 (check: 456 + 544 = 1,000 ✓, 3+2=5, total 6,000).</span><span class="step">➖ 10,000 − 6,000 = <strong>4,000</strong>.</span><span class="step">✅ Adding the subtractors first turns two hard subtractions into one easy one!</span>`
  },
  {
    level:'hard',
    text:`Cara has a ribbon 3 metres long. She cuts off pieces of 45 cm, 75 cm, and 80 cm. How much ribbon remains? (Be careful with units!)`,
    choices:['100 cm','200 cm','150 cm','50 cm'],
    answer:'100 cm',
    explanation:`<span class="step">🎀 Total ribbon: 3 m = <strong>300 cm</strong>.</span><span class="step">➕ Total cut: 45 + 75 + 80 = <strong>200 cm</strong>.</span><span class="step">➖ Remaining: 300 − 200 = <strong>100 cm</strong>.</span><span class="step">💡 The trap: mixing metres and centimetres. Always convert to the same unit FIRST — then solve!</span>`
  }
];

const STORAGE_KEY = 'mathChampions_sub';
const EMPTY_STATS = () => ({ attempts: [], questions: {}, streak: { current: 0, best: 0, lastDate: null } });
function loadStats() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || EMPTY_STATS(); } catch { return EMPTY_STATS(); } }
function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let current=0,attempts=0,scoreCorrect=0,scoreWrong=0,scoreDone=0;
let shuffledChoices=[],quizStartTime=Date.now(),quizQResults=new Array(30).fill(null);
let timerInterval=null,timerSeconds=0;

function updateScore(){document.getElementById('score-correct').textContent=scoreCorrect;document.getElementById('score-wrong').textContent=scoreWrong;document.getElementById('score-done').textContent=scoreDone;document.getElementById('progress-bar').style.width=(scoreDone/30*100)+'%';document.getElementById('progress-label').textContent=current<30?`Question ${current+1} of 30`:'All done!';}
function renderQuestion(idx){attempts=0;const q=questions[idx];shuffledChoices=[...q.choices].sort(()=>Math.random()-0.5);document.getElementById('progress-label').textContent=`Question ${idx+1} of 30`;document.getElementById('main').innerHTML=`<div class="card"><div class="card-top"><span class="q-counter">Question ${idx+1} of 30</span><span class="badge badge-${q.level}">${q.level}</span></div><div class="q-text">${q.text}</div><div class="choices" id="choices">${shuffledChoices.map((c,i)=>`<button class="choice-btn" id="btn-${i}" onclick="handleChoice(${i})">${c}</button>`).join('')}</div><div class="feedback" id="feedback"></div><div class="explanation" id="explanation"></div><button class="next-btn" id="next-btn" onclick="goNext()">${idx+1<30?'Next Question →':'See My Results'}</button></div>`;}
function handleChoice(btnIdx){const q=questions[current],chosen=shuffledChoices[btnIdx],feedback=document.getElementById('feedback'),explEl=document.getElementById('explanation'),nextBtn=document.getElementById('next-btn'),btn=document.getElementById(`btn-${btnIdx}`);attempts++;const isCorrect=chosen===q.answer;if(isCorrect){quizQResults[current]='first';btn.classList.add('state-correct');disableAll();feedback.textContent='🎉 Correct! Fantastic work!';feedback.className='feedback show correct';showExplanation(explEl,q.explanation);nextBtn.classList.add('show');scoreCorrect++;scoreDone++;updateScore();}else{quizQResults[current]='missed';btn.classList.add('state-wrong');disableAll();revealCorrect(q.answer);feedback.textContent=`❌ The correct answer is: ${q.answer}`;feedback.className='feedback show wrong';showExplanation(explEl,q.explanation);nextBtn.classList.add('show');scoreWrong++;scoreDone++;updateScore();}}
function showExplanation(el,html){el.innerHTML=`<div class="explanation-title">🧮 Here's how to solve it!</div><div class="explanation-body">${html}</div>`;el.className='explanation show';}
function disableAll(){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);}
function revealCorrect(answer){shuffledChoices.forEach((c,i)=>{if(c===answer)document.getElementById(`btn-${i}`).classList.add('state-reveal');});}
function goNext(){current++;if(current>=questions.length)showFinalScreen();else renderQuestion(current);}

function showFinalScreen(){stopTimer();saveAttempt();document.getElementById('progress-label').textContent='All done!';const pct=Math.round((scoreCorrect/30)*100),timeStr=formatTime(timerSeconds),isChampion=pct>=90,tallyTime=`<div class="tally-box"><div class="num">${timeStr}</div><div class="lbl">Time</div></div>`;if(isChampion){document.getElementById('main').innerHTML=`<div class="final-screen championship-wrap"><span class="trophy-cup">🏆</span><div class="champion-title">MATH CHAMPION!</div><div class="champion-subtitle">Incredible — you got ${scoreCorrect} out of 30 correct!</div><div class="final-tally"><div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div><div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div><div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>${tallyTime}</div><button class="restart-btn" onclick="restartQuiz()">🔄 Play Again</button></div>`;launchFireworks();}else{const emoji=pct>=70?'⭐':pct>=50?'👍':'💪',msg=pct>=70?'Great job! Keep practising!':pct>=50?'Good effort! You can do even better!':'Keep going — practice makes perfect!';document.getElementById('main').innerHTML=`<div class="final-screen"><h2>${emoji} Quiz Complete!</h2><p>${msg}</p><div class="final-tally"><div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div><div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div><div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>${tallyTime}</div><button class="restart-btn" onclick="restartQuiz()">🔄 Try Again</button></div>`;}}

function launchFireworks(){const canvas=document.createElement('canvas');canvas.id='fireworks-canvas';document.body.appendChild(canvas);const ctx=canvas.getContext('2d');const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};resize();window.addEventListener('resize',resize);const COLORS=['#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#f97316','#ec4899','#facc15'];const particles=[];function Particle(x,y){const color=COLORS[Math.floor(Math.random()*COLORS.length)],angle=Math.random()*Math.PI*2,speed=Math.random()*7+2;return{x,y,color,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,radius:Math.random()*3+1.5,alpha:1,decay:Math.random()*0.018+0.008,gravity:0.12};}function burst(x,y){for(let i=0;i<70;i++)particles.push(Particle(x,y));}let fired=0;const pos=()=>[Math.random()*canvas.width*0.7+canvas.width*0.15,Math.random()*canvas.height*0.55+canvas.height*0.05];[0,300,600,900,1200,1600,2000,2400,2800,3200,3600,4000,4400,4800].forEach(d=>setTimeout(()=>{const[x,y]=pos();burst(x,y);fired++;},d));let animId;function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;if(p.alpha<=0){particles.splice(i,1);continue;}ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();ctx.restore();}if(fired<14||particles.length>0)animId=requestAnimationFrame(animate);else{cancelAnimationFrame(animId);window.removeEventListener('resize',resize);canvas.remove();}}animate();}

function saveAttempt(){const stats=loadStats(),pct=Math.round((scoreCorrect/30)*100),secs=Math.round((Date.now()-quizStartTime)/1000),byLevel={easy:0,medium:0,hard:0};quizQResults.forEach((r,i)=>{if(r==='first')byLevel[questions[i].level]++;});stats.attempts.push({date:new Date().toISOString().slice(0,10),score:scoreCorrect,pct,secs,byLevel});if(stats.attempts.length>50)stats.attempts=stats.attempts.slice(-50);quizQResults.forEach((r,i)=>{if(!r)return;const k=String(i);if(!stats.questions[k])stats.questions[k]={seen:0,firstTry:0,missed:0};stats.questions[k].seen++;if(r==='first')stats.questions[k].firstTry++;if(r==='missed')stats.questions[k].missed++;});const today=new Date().toISOString().slice(0,10),yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);if(stats.streak.lastDate===today){}else if(stats.streak.lastDate===yesterday){stats.streak.current++;}else{stats.streak.current=1;}stats.streak.best=Math.max(stats.streak.best,stats.streak.current);stats.streak.lastDate=today;saveStats(stats);}

function showProgressPanel(){const stats=loadStats(),att=stats.attempts,total=att.length,bestPct=total?Math.max(...att.map(a=>a.pct)):0,avgPct=total?Math.round(att.reduce((s,a)=>s+a.pct,0)/total):0,streak=stats.streak,recent=att.slice(-10);const barsHtml=recent.map(a=>`<div class="bar-col"><span class="bar-pct-lbl">${a.pct}%</span><div class="bar-fill ${a.pct>=90?'bar-champion':''}" style="height:${a.pct}%"></div></div>`).join('');const best=total?att.reduce((b,a)=>a.pct>b.pct?a:b):null;const levelHtml=best?['easy','medium','hard'].map(lvl=>{const max=lvl==='easy'?5:lvl==='medium'?10:15,got=best.byLevel[lvl]||0,pct=Math.round(got/max*100),color=lvl==='easy'?'var(--easy)':lvl==='medium'?'var(--medium)':'var(--hard)';return`<div class="level-row"><span class="level-row-label" style="color:${color}">${lvl.charAt(0).toUpperCase()+lvl.slice(1)}</span><div class="level-track"><div class="level-fill" style="width:${pct}%;background:${color}"></div></div><span class="level-pct">${got}/${max}</span></div>`;}).join(''):'';const weakQ=Object.entries(stats.questions).filter(([,v])=>v.seen>=2&&v.missed>0).sort(([,a],[,b])=>(b.missed/b.seen)-(a.missed/a.seen)).slice(0,4);const weakHtml=weakQ.map(([idx,v])=>{const q=questions[parseInt(idx)],short=q.text.length>65?q.text.substring(0,65)+'…':q.text;return`<li class="weak-item"><span style="flex:1">${short}</span><span class="miss-badge">missed ${v.missed}/${v.seen}</span></li>`;}).join('');const overlay=document.createElement('div');overlay.className='progress-panel';overlay.id='progress-panel-overlay';overlay.innerHTML=`<div class="progress-panel-inner"><div class="panel-header"><span class="panel-title">📊 My Progress — Subtraction</span><button class="panel-close" onclick="closeProgressPanel()">✕</button></div><div class="streak-card"><span class="streak-fire">🔥</span><div><div class="streak-num">${streak.current} day${streak.current!==1?'s':''}</div><div class="streak-lbl">Current streak &nbsp;·&nbsp; Best: ${streak.best} day${streak.best!==1?'s':''}</div></div></div><div class="stat-grid"><div class="stat-card"><div class="s-num">${total}</div><div class="s-lbl">Quizzes</div></div><div class="stat-card"><div class="s-num">${bestPct}%</div><div class="s-lbl">Best Score</div></div><div class="stat-card"><div class="s-num">${avgPct}%</div><div class="s-lbl">Average</div></div></div>${total===0?'<div class="empty-state">Complete your first quiz to see stats here! 🎯</div>':''}${recent.length?`<div class="panel-section-title">Recent Attempts</div><div class="bar-chart">${barsHtml}</div>`:''}${best?`<div class="panel-section-title">Best Attempt — By Difficulty</div><div class="level-bars">${levelHtml}</div>`:''}${weakHtml?`<div class="panel-section-title">Questions to Practise More</div><ul class="weak-list">${weakHtml}</ul>`:''}</div>`;overlay.addEventListener('click',e=>{if(e.target===overlay)closeProgressPanel();});document.body.appendChild(overlay);}
function closeProgressPanel(){document.getElementById('progress-panel-overlay')?.remove();}

function startTimer(){timerSeconds=0;clearInterval(timerInterval);document.getElementById('timer').textContent='⏱ 0:00';timerInterval=setInterval(()=>{timerSeconds++;document.getElementById('timer').textContent='⏱ '+formatTime(timerSeconds);},1000);}
function stopTimer(){clearInterval(timerInterval);}
function formatTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function restartQuiz(){current=0;attempts=0;scoreCorrect=0;scoreWrong=0;scoreDone=0;quizQResults=new Array(30).fill(null);quizStartTime=Date.now();updateScore();startTimer();renderQuestion(0);}

updateScore();startTimer();renderQuestion(0);
</script>
