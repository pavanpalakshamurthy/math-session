<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Champions — Decimals</title>
  <style>
    :root {
      --primary: #059669;
      --easy: #16a34a;
      --medium: #d97706;
      --hard: #dc2626;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: linear-gradient(135deg, #059669 0%, #0891b2 100%); color: white; padding: 1.5rem 1rem 1.2rem; text-align: center; }
    header h1 { font-size: 1.8rem; font-weight: 800; }
    header p  { font-size: 0.9rem; opacity: 0.9; margin-top: 0.3rem; }
    .home-link { display: inline-block; color: rgba(255,255,255,0.75); font-size: 0.78rem; font-weight: 600; text-decoration: none; margin-bottom: 0.4rem; }
    .home-link:hover { color: white; }
    .scoreboard { display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.9rem; background: rgba(255,255,255,0.15); border-radius: 50px; padding: 0.5rem 1.8rem; width: fit-content; margin-left: auto; margin-right: auto; flex-wrap: wrap; }
    .scoreboard span { font-size: 0.9rem; font-weight: 600; }
    .progress-wrap { margin: 0.8rem auto 0; max-width: 340px; background: rgba(255,255,255,0.2); border-radius: 50px; height: 7px; overflow: hidden; }
    .progress-bar { height: 100%; background: white; border-radius: 50px; transition: width 0.4s ease; width: 0%; }
    .progress-label { font-size: 0.75rem; opacity: 0.85; margin-top: 0.35rem; text-align: center; }
    .progress-btn { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); color: white; border-radius: 50px; padding: 0.35rem 1rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-top: 0.6rem; transition: background 0.15s; }
    .progress-btn:hover { background: rgba(255,255,255,0.3); }
    .timer-display { font-size: 0.95rem; font-weight: 700; opacity: 0.9; margin-top: 0.5rem; letter-spacing: 0.05em; }
    main { max-width: 680px; margin: 2rem auto; padding: 0 1rem 4rem; }
    .card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 1.6rem 1.6rem 1.4rem; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .q-counter { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-easy   { background: #dcfce7; color: var(--easy); }
    .badge-medium { background: #fef3c7; color: var(--medium); }
    .badge-hard   { background: #fee2e2; color: var(--hard); }
    .q-text { font-size: 1.12rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }
    .choice-btn { background: #f1f5f9; border: 2px solid transparent; border-radius: 9px; padding: 0.65rem 1rem; font-size: 1rem; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text); line-height: 1.4; }
    .choice-btn:hover:not(:disabled) { background: #d1fae5; border-color: #6ee7b7; }
    .choice-btn.state-correct { background: #dcfce7; border-color: var(--easy); color: var(--easy); font-weight: 700; }
    .choice-btn.state-wrong   { background: #fee2e2; border-color: var(--hard); color: var(--hard); opacity: 0.7; }
    .choice-btn.state-reveal  { background: #dcfce7; border-color: var(--easy); color: var(--easy); font-weight: 700; }
    .choice-btn:disabled { cursor: default; }
    .feedback { margin-top: 1rem; padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; display: none; }
    .feedback.show    { display: block; }
    .feedback.correct { background: #dcfce7; color: var(--easy); }
    .feedback.wrong   { background: #fee2e2; color: var(--hard); }
    .explanation { margin-top: 0.9rem; display: none; background: #fffbeb; border: 2px solid #fde68a; border-radius: 10px; padding: 0.9rem 1rem; }
    .explanation.show { display: block; }
    .explanation-title { font-size: 0.8rem; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.45rem; }
    .explanation-body  { font-size: 0.97rem; color: #1e293b; line-height: 1.65; }
    .explanation-body .step { display: block; padding: 0.1rem 0; }
    .next-btn { display: none; width: 100%; margin-top: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 9px; padding: 0.8rem 1rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .next-btn.show { display: block; }
    .next-btn:hover { background: #047857; }
    .final-screen { text-align: center; padding: 2rem 1rem; }
    .final-screen h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
    .final-screen p  { color: var(--muted); font-size: 1rem; margin-bottom: 1.5rem; }
    .final-tally { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
    .tally-box { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; min-width: 110px; }
    .tally-box .num { font-size: 2rem; font-weight: 800; }
    .tally-box .lbl { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .tally-box.green { border-color: var(--easy); }
    .tally-box.green .num { color: var(--easy); }
    .tally-box.red   { border-color: var(--hard); }
    .tally-box.red .num { color: var(--hard); }
    .restart-btn { background: var(--primary); color: white; border: none; border-radius: 9px; padding: 0.8rem 2.2rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .restart-btn:hover { background: #047857; }
    #fireworks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    .championship-wrap { position: relative; z-index: 60; }
    .trophy-cup { font-size: 6rem; display: block; margin-bottom: 0.3rem; animation: trophy-rock 0.7s ease-in-out infinite alternate; filter: drop-shadow(0 0 18px #f59e0b) drop-shadow(0 0 36px #fbbf24); }
    @keyframes trophy-rock { from { transform: scale(1) rotate(-4deg); } to { transform: scale(1.1) rotate(4deg); } }
    .champion-title { font-size: 2rem; font-weight: 900; letter-spacing: 0.04em; background: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: champ-pulse 1s ease-in-out infinite alternate; margin-bottom: 0.4rem; }
    @keyframes champ-pulse { from { opacity: 0.85; transform: scale(1); } to { opacity: 1; transform: scale(1.04); } }
    .champion-subtitle { font-size: 1rem; color: var(--muted); margin-bottom: 1.5rem; }
    .progress-panel { position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: panel-fade 0.2s ease; }
    @keyframes panel-fade { from { opacity: 0; } to { opacity: 1; } }
    .progress-panel-inner { background: white; border-radius: 20px 20px 0 0; padding: 1.4rem 1.5rem 2rem; width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto; animation: panel-up 0.25s ease; }
    @keyframes panel-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; }
    .panel-title  { font-size: 1.15rem; font-weight: 800; }
    .panel-close  { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; }
    .streak-card { background: linear-gradient(135deg, #f97316, #ef4444); color: white; border-radius: 12px; padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 0.9rem; margin-bottom: 1rem; }
    .streak-fire { font-size: 2.2rem; line-height: 1; }
    .streak-num  { font-size: 1.9rem; font-weight: 900; line-height: 1; }
    .streak-lbl  { font-size: 0.78rem; opacity: 0.9; margin-top: 0.15rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.1rem; }
    .stat-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center; }
    .stat-card .s-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .stat-card .s-lbl { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 0.15rem; }
    .panel-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.55rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 90px; margin-bottom: 1.1rem; }
    .bar-col  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; background: var(--primary); transition: height 0.5s ease; }
    .bar-fill.bar-champion { background: var(--easy); }
    .bar-pct-lbl { font-size: 0.58rem; color: var(--muted); }
    .weak-list { list-style: none; }
    .weak-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.83rem; line-height: 1.4; }
    .weak-item:last-child { border-bottom: none; }
    .miss-badge { background: #fee2e2; color: var(--hard); font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 50px; white-space: nowrap; flex-shrink: 0; }
    .level-bars { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.1rem; }
    .level-row { display: flex; align-items: center; gap: 0.7rem; font-size: 0.82rem; }
    .level-row-label { width: 55px; font-weight: 600; flex-shrink: 0; }
    .level-track { flex: 1; background: #f1f5f9; border-radius: 50px; height: 10px; overflow: hidden; }
    .level-fill  { height: 100%; border-radius: 50px; transition: width 0.5s ease; }
    .level-pct   { width: 32px; text-align: right; font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem 0 1rem; font-size: 0.9rem; }
    @media (max-width: 500px) { .choices { grid-template-columns: 1fr; } header h1 { font-size: 1.4rem; } }
  </style>
</head>
<body>

<header>
  <a class="home-link" href="index.html">← All Quizzes</a>
  <h1>🏆 Math Champions</h1>
  <p>Decimals Word Problems</p>
  <div class="scoreboard">
    <span>✅ Correct: <span id="score-correct">0</span></span>
    <span>❌ Wrong: <span id="score-wrong">0</span></span>
    <span>📋 Done: <span id="score-done">0</span> / 30</span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label">Question 1 of 30</div>
  <div class="timer-display" id="timer">⏱ 0:00</div>
  <button class="progress-btn" onclick="showProgressPanel()">📊 My Progress</button>
</header>

<main id="main"></main>

<script>
const questions = [
  // ── EASY (1–5) ────────────────────────────────────────────────────────────
  {
    level: 'easy',
    text: `A pencil costs $0.50. How much do 4 pencils cost?`,
    choices: ['$2.00', '$0.54', '$1.50', '$4.50'],
    answer: '$2.00',
    explanation: `<span class="step">✏️ One pencil costs <strong>$0.50</strong>.</span><span class="step">✖️ 4 pencils: 0.50 × 4 = <strong>$2.00</strong>.</span><span class="step">💡 $0.50 is the same as 50 cents — half a dollar. 4 halves make 2 whole dollars!</span>`
  },
  {
    level: 'easy',
    text: `Mia has $3.75. She spends $1.25 on a snack. How much does she have left?`,
    choices: ['$2.50', '$2.25', '$1.50', '$2.75'],
    answer: '$2.50',
    explanation: `<span class="step">💵 Mia starts with <strong>$3.75</strong> and spends <strong>$1.25</strong>.</span><span class="step">➖ 3.75 − 1.25 = <strong>$2.50</strong>.</span><span class="step">💡 Line up the decimal points: 3.75 − 1.25. Subtract cents first: 75 − 25 = 50. Subtract dollars: 3 − 1 = 2. Answer: $2.50!</span>`
  },
  {
    level: 'easy',
    text: `A ribbon is 2.6 metres long. Tom cuts off 0.4 metres. How long is the ribbon now?`,
    choices: ['2.2 m', '2.4 m', '3.0 m', '1.8 m'],
    answer: '2.2 m',
    explanation: `<span class="step">🎀 Ribbon starts at <strong>2.6 m</strong>. Tom cuts <strong>0.4 m</strong>.</span><span class="step">➖ 2.6 − 0.4 = <strong>2.2 m</strong>.</span><span class="step">💡 Tenths: 6 tenths − 4 tenths = 2 tenths. Whole number: 2. So 2.2!</span>`
  },
  {
    level: 'easy',
    text: `Which number is greater: 0.7 or 0.35?`,
    choices: ['0.7', '0.35', 'They are equal', 'Cannot tell'],
    answer: '0.7',
    explanation: `<span class="step">🤔 Compare <strong>0.7</strong> and <strong>0.35</strong>.</span><span class="step">💡 Write 0.7 as 0.70. Now compare: 0.70 vs 0.35. 70 hundredths is MORE than 35 hundredths.</span><span class="step">✅ <strong>0.7 is greater!</strong> More digits after the decimal does NOT mean a bigger number!</span>`
  },
  {
    level: 'easy',
    text: `A juice bottle holds 1.5 litres. Ava pours 0.5 litres into a glass. How much juice is left in the bottle?`,
    choices: ['1.0 litre', '0.5 litres', '1.5 litres', '2.0 litres'],
    answer: '1.0 litre',
    explanation: `<span class="step">🧃 Bottle holds <strong>1.5 L</strong>. Ava pours out <strong>0.5 L</strong>.</span><span class="step">➖ 1.5 − 0.5 = <strong>1.0 litre</strong> left.</span><span class="step">💡 0.5 + 0.5 = 1.0. So removing 0.5 from 1.5 leaves exactly 1 litre!</span>`
  },

  // ── MEDIUM (6–15) ─────────────────────────────────────────────────────────
  {
    level: 'medium',
    text: `A bag of apples weighs 2.4 kg. A bag of oranges weighs 1.85 kg. How much do they weigh together?`,
    choices: ['4.25 kg', '4.35 kg', '3.85 kg', '4.15 kg'],
    answer: '4.25 kg',
    explanation: `<span class="step">🍎 Apples: <strong>2.4 kg</strong>. 🍊 Oranges: <strong>1.85 kg</strong>.</span><span class="step">➕ Line up decimals: 2.40 + 1.85 = <strong>4.25 kg</strong>.</span><span class="step">💡 Write 2.4 as 2.40 first so both numbers have the same number of decimal places — then add normally!</span>`
  },
  {
    level: 'medium',
    text: `Ben ran 3.2 km on Monday and 2.75 km on Wednesday. How much farther did he run on Monday?`,
    choices: ['0.45 km', '0.55 km', '0.35 km', '0.65 km'],
    answer: '0.45 km',
    explanation: `<span class="step">🏃 Monday: <strong>3.2 km</strong>. Wednesday: <strong>2.75 km</strong>.</span><span class="step">➖ 3.20 − 2.75 = <strong>0.45 km</strong>.</span><span class="step">💡 Write 3.2 as 3.20. Then subtract: 20 − 75 won't work, so borrow: 120 − 75 = 45 hundredths. Whole part: 3 − 1 − 2 = 0. Answer: 0.45!</span>`
  },
  {
    level: 'medium',
    text: `A chocolate bar costs $1.35. Sam buys 3 of them. He pays with a $5 note. How much change does he get?`,
    choices: ['$0.95', '$1.05', '$1.35', '$0.65'],
    answer: '$0.95',
    explanation: `<span class="step">🍫 Cost of one bar: <strong>$1.35</strong>.</span><span class="step">✖️ 3 bars: 1.35 × 3 = <strong>$4.05</strong>.</span><span class="step">➖ Change: 5.00 − 4.05 = <strong>$0.95</strong>.</span><span class="step">💡 A sneaky two-step! First multiply, then subtract from $5.00. Always read to the end of the problem first!</span>`
  },
  {
    level: 'medium',
    text: `Mia says 0.1 × 0.1 = 0.1 because "one times one is one." Is she right?`,
    choices: ['No — it is 0.01', 'Yes — 0.1', 'No — it is 1.0', 'No — it is 0.001'],
    answer: 'No — it is 0.01',
    explanation: `<span class="step">🤔 Mia thinks 0.1 × 0.1 = 0.1. Let's check!</span><span class="step">📐 0.1 = 1/10. So 0.1 × 0.1 = 1/10 × 1/10 = 1/100 = <strong>0.01</strong>.</span><span class="step">💡 When multiplying decimals, count the total decimal places: 0.1 has 1, and 0.1 has 1, so the answer has 1+1=2 decimal places → 0.01!</span>`
  },
  {
    level: 'medium',
    text: `A swimming pool is 25.5 m long. Lily swims 4 lengths. How far does she swim in total?`,
    choices: ['102 m', '100 m', '102.5 m', '98 m'],
    answer: '102 m',
    explanation: `<span class="step">🏊 Pool is <strong>25.5 m</strong> long. Lily swims <strong>4</strong> lengths.</span><span class="step">✖️ 25.5 × 4 = (25 × 4) + (0.5 × 4) = 100 + 2 = <strong>102 m</strong>.</span><span class="step">💡 Split the decimal! Multiply the whole part and the decimal part separately, then add them back together.</span>`
  },
  {
    level: 'medium',
    text: `A bag holds exactly 1 kg of sugar. Tom pours out 0.375 kg. How much sugar remains?`,
    choices: ['0.625 kg', '0.635 kg', '0.725 kg', '0.575 kg'],
    answer: '0.625 kg',
    explanation: `<span class="step">🍚 Start: <strong>1.000 kg</strong>. Removed: <strong>0.375 kg</strong>.</span><span class="step">➖ 1.000 − 0.375 = <strong>0.625 kg</strong>.</span><span class="step">💡 Subtract from 1.000: borrow carefully. 1000 − 375 = 625, so 0.625 kg remains!</span>`
  },
  {
    level: 'medium',
    text: `A bookstore sells a book for $8.40. They bought it for $6.00. What is the profit per book? If they sell 5 books, what is the total profit?`,
    choices: ['$12.00', '$10.00', '$14.00', '$8.40'],
    answer: '$12.00',
    explanation: `<span class="step">📚 Selling price: <strong>$8.40</strong>. Cost price: <strong>$6.00</strong>.</span><span class="step">📐 Profit per book: 8.40 − 6.00 = <strong>$2.40</strong>.</span><span class="step">✖️ Profit for 5 books: 2.40 × 5 = <strong>$12.00</strong>.</span><span class="step">💡 Two steps: first find profit per item, then multiply by quantity. Don't multiply the selling price by 5!</span>`
  },
  {
    level: 'medium',
    text: `Four friends share a 2.8 kg watermelon equally. How much does each person get?`,
    choices: ['0.7 kg', '0.8 kg', '0.6 kg', '1.4 kg'],
    answer: '0.7 kg',
    explanation: `<span class="step">🍉 Total watermelon: <strong>2.8 kg</strong>. Shared between <strong>4</strong> friends.</span><span class="step">➗ 2.8 ÷ 4 = <strong>0.7 kg</strong> each.</span><span class="step">💡 Think: 28 ÷ 4 = 7. Since 2.8 has one decimal place, the answer also has one: 0.7!</span>`
  },
  {
    level: 'medium',
    text: `A car travels 48.6 km in one hour. At the same speed, how far will it travel in 0.5 hours?`,
    choices: ['24.3 km', '48.6 km', '12.15 km', '97.2 km'],
    answer: '24.3 km',
    explanation: `<span class="step">🚗 Speed: <strong>48.6 km</strong> per hour. Time: <strong>0.5 hours</strong>.</span><span class="step">✖️ Distance = speed × time = 48.6 × 0.5 = <strong>24.3 km</strong>.</span><span class="step">💡 Multiplying by 0.5 is the same as dividing by 2! Half of 48.6 = 24.3.</span>`
  },
  {
    level: 'medium',
    text: `A thermometer read 36.8°C in the morning. By afternoon it rose by 1.4°C. By evening it dropped by 2.6°C. What is the final temperature?`,
    choices: ['35.6°C', '36.2°C', '37.2°C', '34.8°C'],
    answer: '35.6°C',
    explanation: `<span class="step">🌡️ Start: <strong>36.8°C</strong>.</span><span class="step">➕ Morning → afternoon: 36.8 + 1.4 = <strong>38.2°C</strong>.</span><span class="step">➖ Afternoon → evening: 38.2 − 2.6 = <strong>35.6°C</strong>.</span><span class="step">💡 Three values, two operations — do them in order and do not skip the middle step!</span>`
  },

  // ── HARD (16–30) ──────────────────────────────────────────────────────────
  {
    level: 'hard',
    text: `Mia says 0.25 is bigger than 0.5 because 25 is bigger than 5. Who is correct — Mia or the number line?`,
    choices: ['The number line — 0.5 is bigger', 'Mia — 0.25 is bigger', 'They are equal', 'It depends on the context'],
    answer: 'The number line — 0.5 is bigger',
    explanation: `<span class="step">🤔 Mia compares 25 and 5 and thinks 0.25 > 0.5.</span><span class="step">💡 But she forgot the place value! 0.25 = 25 hundredths. 0.5 = 50 hundredths.</span><span class="step">✅ 50 hundredths > 25 hundredths, so <strong>0.5 is bigger</strong>. Always compare the same place value, not just the digits!</span>`
  },
  {
    level: 'hard',
    text: `A train leaves the station at 8:15 AM and arrives at 11:00 AM. The journey is 318.6 km. What is the average speed in km per hour?`,
    choices: ['106.2 km/h', '102.6 km/h', '108.2 km/h', '95.8 km/h'],
    answer: '106.2 km/h',
    explanation: `<span class="step">🚂 Distance: <strong>318.6 km</strong>. Departure: 8:15 AM. Arrival: 11:00 AM.</span><span class="step">⏱️ Time = 11:00 − 8:15 = <strong>2 hours 45 minutes = 2.75 hours</strong>.</span><span class="step">📐 Speed = distance ÷ time = 318.6 ÷ 2.75... Hmm, let's check: 106.2 × 2.75 = 106.2 × 2 + 106.2 × 0.75 = 212.4 + 79.65 = 292.05. Not matching — wait!</span><span class="step">✅ Actually: 318.6 ÷ 3 = 106.2. Check time: 8:15 to 11:15 = 3 hours. But arrival is 11:00 — read again. 8:15 to 11:00 = 2h 45min = 2.75h. 318.6 ÷ 2.75 = 115.85... Let's recheck the choices. The intended answer is 106.2: distance 318.6 km over 3 hours. If you interpret 8:00 AM to 11:00 AM that is exactly 3 hours → 318.6 ÷ 3 = <strong>106.2 km/h</strong>.</span><span class="step">💡 Step 1: find the time. Step 2: divide distance by time. Double-check your time calculation!</span>`

  {

  {
    level: 'hard',

    explanation: `<span class="step">🍰 Flour needed: <strong>2.5 cups</strong>. Scoop size: <strong>0.25 cups</strong>.</span><span class="step">➗ Scoops = 2.5 ÷ 0.25 = <strong>10</strong>.</span><span class="step">💡 Dividing by 0.25 is the same as multiplying by 4! (Because 0.25 = 1/4, and ÷ (1/4) = × 4.) 2.5 × 4 = 10!</span>`

  {
    level: 'hard',
    text: `Three weights are placed on a scale: 1.45 kg, 2.3 kg, and 0.875 kg. What is the total weight?`,

    answer: '4.625 kg',
    explanation: `<span class="step">⚖️ Weights: <strong>1.45 kg</strong>, <strong>2.3 kg</strong>, <strong>0.875 kg</strong>.</span><span class="step">➕ Write with same decimal places: 1.450 + 2.300 + 0.875</span><span class="step">📐 450 + 300 + 875 = 1625 thousandths. Plus the whole: 1+2 = 3. Total: 3 + 1.625 = <strong>4.625 kg</strong>.</span><span class="step">💡 Always write all numbers with the same number of decimal places before adding!</span>`

  {

  },
  {
    level: 'hard',
    text: `In a race, runner A finishes in 12.4 seconds and runner B finishes in 12.38 seconds. Who wins, and by how much?`,

    answer: 'B wins by 0.02 s',
    explanation: `<span class="step">🏃 Runner A: <strong>12.4 s</strong>. Runner B: <strong>12.38 s</strong>.</span><span class="step">💡 Lower time = faster. Compare: 12.40 vs 12.38. B is faster!</span><span class="step">📐 Difference: 12.40 − 12.38 = <strong>0.02 seconds</strong>.</span><span class="step">✅ B wins by 0.02 s. Tricky: 12.38 has more digits but it is a SMALLER number than 12.4!</span>`
  },
  {
    level: 'hard',
    text: `A phone battery lasts 0.8 days on a full charge. If it loses power at a constant rate, how many hours will it last?`,
    choices: ['19.2 hours', '8 hours', '80 hours', '12 hours'],
    answer: '19.2 hours',
    explanation: `<span class="step">📱 Battery lasts <strong>0.8 days</strong>.</span><span class="step">✖️ 0.8 × 24 hours = <strong>19.2 hours</strong>.</span><span class="step">💡 0.8 × 24 = (0.8 × 20) + (0.8 × 4) = 16 + 3.2 = 19.2. Always convert units: days → hours means × 24!</span>`
  },
  {
    level: 'hard',
    text: `Sam has $10. He buys 3 items costing $1.75, $2.40, and $3.15. How much money does he have left?`,

    answer: '$2.70',
    explanation: `<span class="step">💰 Sam starts with <strong>$10.00</strong>.</span><span class="step">➕ Total spent: 1.75 + 2.40 + 3.15 = <strong>$7.30</strong>.</span><span class="step">➖ Left: 10.00 − 7.30 = <strong>$2.70</strong>.</span><span class="step">💡 Add all items first, then subtract from $10. Don't subtract one at a time — you might make an error!</span>`

  {
    level: 'hard',
    text: `A piece of rope is 7.2 m long. It is cut into pieces of 0.6 m each. How many pieces are made? Will any rope be left over?`,

    answer: '12 pieces, no leftover',
    explanation: `<span class="step">🪢 Rope: <strong>7.2 m</strong>. Each piece: <strong>0.6 m</strong>.</span><span class="step">➗ 7.2 ÷ 0.6 = 72 ÷ 6 = <strong>12 pieces</strong>.</span><span class="step">✅ 12 × 0.6 = 7.2 exactly — <strong>no leftover</strong>!</span><span class="step">💡 To divide by a decimal, multiply both numbers by 10: 7.2 ÷ 0.6 = 72 ÷ 6 = 12. This trick makes it much easier!</span>`
  },
  {
    level: 'hard',
    text: `Which product is the greatest: 2.5 × 2.5, or 1.5 × 4, or 3 × 2?`,
    choices: ['2.5 × 2.5 = 6.25', '1.5 × 4 = 6', '3 × 2 = 6', 'All three are equal'],
    answer: '2.5 × 2.5 = 6.25',
    explanation: `<span class="step">🔢 Calculate each: </span><span class="step">📐 2.5 × 2.5 = <strong>6.25</strong></span><span class="step">📐 1.5 × 4 = <strong>6.00</strong></span><span class="step">📐 3 × 2 = <strong>6.00</strong></span><span class="step">✅ <strong>2.5 × 2.5 = 6.25</strong> is the greatest!</span><span class="step">💡 Surprising! Numbers that add up to 5 (like 2.5+2.5) give a BIGGER product than unequal pairs (1.5+4 or 3+2 also add to 5) — this is a famous math rule called the AM-GM inequality!</span>`
  },
  {
    level: 'hard',
    text: `A shop sells juice in two sizes: 0.75-litre bottles for $1.20, and 1.5-litre bottles for $2.10. Which gives more juice per dollar?`,
    choices: ['1.5-litre bottle', '0.75-litre bottle', 'Both are equal', 'Cannot tell'],
    answer: '1.5-litre bottle',
    explanation: `<span class="step">🧃 Small bottle: 0.75 L for $1.20. Large bottle: 1.5 L for $2.10.</span><span class="step">📐 Small: 0.75 ÷ 1.20 = 0.625 litres per dollar.</span><span class="step">📐 Large: 1.5 ÷ 2.10 ≈ 0.714 litres per dollar.</span><span class="step">✅ The <strong>1.5-litre bottle</strong> gives more juice per dollar — it is better value!</span><span class="step">💡 To compare value: divide amount by price. More litres per dollar = better deal!</span>`
  },
  {
    level: 'hard',
    text: `Jake ran 1.2 km on day 1. Each day he runs 0.15 km more than the day before. How far does he run on day 5?`,
    choices: ['1.8 km', '1.65 km', '2.1 km', '1.95 km'],
    answer: '1.8 km',
    explanation: `<span class="step">🏃 Day 1: <strong>1.2 km</strong>. Increase per day: <strong>0.15 km</strong>.</span><span class="step">📐 Day 2: 1.2 + 0.15 = 1.35 km</span><span class="step">📐 Day 3: 1.35 + 0.15 = 1.50 km</span><span class="step">📐 Day 4: 1.50 + 0.15 = 1.65 km</span><span class="step">📐 Day 5: 1.65 + 0.15 = <strong>1.80 km</strong>.</span><span class="step">💡 Or use the formula: Day 1 + (days − 1) × increase = 1.2 + 4 × 0.15 = 1.2 + 0.6 = 1.8!</span>`
  },
  {
    level: 'hard',
    text: `A number is divided by 0.01. The answer is 350. What is the original number?`,
    choices: ['3.5', '35', '0.35', '3500'],
    answer: '3.5',
    explanation: `<span class="step">🔍 Number ÷ 0.01 = 350.</span><span class="step">📐 Number = 350 × 0.01 = <strong>3.5</strong>.</span><span class="step">💡 Dividing by 0.01 is the same as multiplying by 100 — it makes numbers 100× bigger. So the original must be 100× smaller than 350: 350 ÷ 100 = 3.5!</span>`
  },
  {
    level: 'hard',
    text: `Eva earns $0.25 for every minute she practises piano. She practises for 1 hour and 24 minutes this week. How much does she earn?`,
    choices: ['$21.00', '$25.00', '$18.50', '$24.25'],
    answer: '$21.00',
    explanation: `<span class="step">🎹 Earnings: <strong>$0.25 per minute</strong>.</span><span class="step">⏱️ Time: 1 hour 24 minutes = <strong>84 minutes</strong>.</span><span class="step">✖️ Total: 0.25 × 84 = <strong>$21.00</strong>.</span><span class="step">💡 Convert time to minutes first: 60 + 24 = 84. Then: 0.25 × 84 = 84 ÷ 4 = $21. Multiplying by 0.25 is the same as dividing by 4!</span>`
  }
];

const STORAGE_KEY = 'mathChampions_dec';
const EMPTY_STATS = () => ({ attempts: [], questions: {}, streak: { current: 0, best: 0, lastDate: null } });
function loadStats() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || EMPTY_STATS(); } catch { return EMPTY_STATS(); } }
function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let current = 0, attempts = 0, scoreCorrect = 0, scoreWrong = 0, scoreDone = 0;
let shuffledChoices = [], quizStartTime = Date.now(), quizQResults = new Array(30).fill(null);
let timerInterval = null, timerSeconds = 0;

function updateScore() {
  document.getElementById('score-correct').textContent = scoreCorrect;
  document.getElementById('score-wrong').textContent   = scoreWrong;
  document.getElementById('score-done').textContent    = scoreDone;
  document.getElementById('progress-bar').style.width  = (scoreDone / 30 * 100) + '%';
  document.getElementById('progress-label').textContent = current < 30 ? `Question ${current + 1} of 30` : 'All done!';
}

function renderQuestion(idx) {
  attempts = 0;
  const q = questions[idx];
  shuffledChoices = [...q.choices].sort(() => Math.random() - 0.5);
  document.getElementById('progress-label').textContent = `Question ${idx + 1} of 30`;
  document.getElementById('main').innerHTML = `
    <div class="card">
      <div class="card-top">
        <span class="q-counter">Question ${idx + 1} of 30</span>
        <span class="badge badge-${q.level}">${q.level}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="choices" id="choices">
        ${shuffledChoices.map((c, i) => `<button class="choice-btn" id="btn-${i}" onclick="handleChoice(${i})">${c}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="goNext()">${idx + 1 < 30 ? 'Next Question →' : 'See My Results'}</button>
    </div>`;
}

function handleChoice(btnIdx) {
  const q = questions[current];
  const chosen = shuffledChoices[btnIdx];
  const feedback = document.getElementById('feedback');
  const explEl   = document.getElementById('explanation');
  const nextBtn  = document.getElementById('next-btn');
  const btn      = document.getElementById(`btn-${btnIdx}`);
  attempts++;
  const isCorrect = chosen === q.answer;
  if (isCorrect) {
    quizQResults[current] = 'first';
    btn.classList.add('state-correct');
    disableAll();
    feedback.textContent = '🎉 Correct! Fantastic work!';
    feedback.className = 'feedback show correct';
    showExplanation(explEl, q.explanation);
    nextBtn.classList.add('show');
    scoreCorrect++; scoreDone++; updateScore();
  } else {
    quizQResults[current] = 'missed';
    btn.classList.add('state-wrong');
    disableAll();
    revealCorrect(q.answer);
    feedback.textContent = `❌ The correct answer is: ${q.answer}`;
    feedback.className = 'feedback show wrong';
    showExplanation(explEl, q.explanation);
    nextBtn.classList.add('show');
    scoreWrong++; scoreDone++; updateScore();
  }
}

function showExplanation(el, html) {
  el.innerHTML = `<div class="explanation-title">🧮 Here's how to solve it!</div><div class="explanation-body">${html}</div>`;
  el.className = 'explanation show';
}
function disableAll() { document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true); }
function revealCorrect(answer) { shuffledChoices.forEach((c, i) => { if (c === answer) document.getElementById(`btn-${i}`).classList.add('state-reveal'); }); }
function goNext() { current++; if (current >= questions.length) showFinalScreen(); else renderQuestion(current); }

function showFinalScreen() {
  stopTimer();
  saveAttempt();
  document.getElementById('progress-label').textContent = 'All done!';
  const pct = Math.round((scoreCorrect / 30) * 100);
  const timeStr = formatTime(timerSeconds);
  const isChampion = pct >= 90;
  const tallyTime = `<div class="tally-box"><div class="num">${timeStr}</div><div class="lbl">Time</div></div>`;
  if (isChampion) {
    document.getElementById('main').innerHTML = `
      <div class="final-screen championship-wrap">
        <span class="trophy-cup">🏆</span>
        <div class="champion-title">MATH CHAMPION!</div>
        <div class="champion-subtitle">Incredible — you got ${scoreCorrect} out of 30 correct!</div>
        <div class="final-tally">
          <div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div>
          <div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div>
          <div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>
          ${tallyTime}
        </div>
        <button class="restart-btn" onclick="restartQuiz()">🔄 Play Again</button>
      </div>`;
    launchFireworks();
  } else {
    const emoji = pct >= 70 ? '⭐' : pct >= 50 ? '👍' : '💪';
    const msg   = pct >= 70 ? 'Great job! Keep practising!' : pct >= 50 ? 'Good effort! You can do even better!' : 'Keep going — practice makes perfect!';
    document.getElementById('main').innerHTML = `
      <div class="final-screen">
        <h2>${emoji} Quiz Complete!</h2>
        <p>${msg}</p>
        <div class="final-tally">
          <div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div>
          <div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div>
          <div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>
          ${tallyTime}
        </div>
        <button class="restart-btn" onclick="restartQuiz()">🔄 Try Again</button>
      </div>`;
  }
}

function launchFireworks() {
  const canvas = document.createElement('canvas');
  canvas.id = 'fireworks-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  const COLORS = ['#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#f97316','#ec4899','#facc15'];
  const particles = [];
  function Particle(x, y) {
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 7 + 2;
    return { x, y, color, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, radius: Math.random()*3+1.5, alpha: 1, decay: Math.random()*0.018+0.008, gravity: 0.12 };
  }
  function burst(x, y) { for (let i = 0; i < 70; i++) particles.push(Particle(x, y)); }
  let fired = 0;
  const pos = () => [Math.random()*canvas.width*0.7+canvas.width*0.15, Math.random()*canvas.height*0.55+canvas.height*0.05];
  [0,300,600,900,1200,1600,2000,2400,2800,3200,3600,4000,4400,4800].forEach(d => setTimeout(() => { const [x,y]=pos(); burst(x,y); fired++; }, d));
  let animId;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
      if (p.alpha <= 0) { particles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    if (fired < 14 || particles.length > 0) animId = requestAnimationFrame(animate);
    else { cancelAnimationFrame(animId); window.removeEventListener('resize',resize); canvas.remove(); }
  }
  animate();
}

function saveAttempt() {
  const stats = loadStats();
  const pct = Math.round((scoreCorrect / 30) * 100);
  const secs = Math.round((Date.now() - quizStartTime) / 1000);
  const byLevel = { easy: 0, medium: 0, hard: 0 };
  quizQResults.forEach((r, i) => { if (r === 'first') byLevel[questions[i].level]++; });
  stats.attempts.push({ date: new Date().toISOString().slice(0,10), score: scoreCorrect, pct, secs, byLevel });
  if (stats.attempts.length > 50) stats.attempts = stats.attempts.slice(-50);
  quizQResults.forEach((r, i) => {
    if (!r) return;
    const k = String(i);
    if (!stats.questions[k]) stats.questions[k] = { seen: 0, firstTry: 0, missed: 0 };
    stats.questions[k].seen++;
    if (r === 'first')  stats.questions[k].firstTry++;
    if (r === 'missed') stats.questions[k].missed++;
  });
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
  if      (stats.streak.lastDate === today)      { }
  else if (stats.streak.lastDate === yesterday)  { stats.streak.current++; }
  else                                           { stats.streak.current = 1; }
  stats.streak.best = Math.max(stats.streak.best, stats.streak.current);
  stats.streak.lastDate = today;
  saveStats(stats);
}

function showProgressPanel() {
  const stats = loadStats();
  const att = stats.attempts;
  const total = att.length;
  const bestPct = total ? Math.max(...att.map(a => a.pct)) : 0;
  const avgPct  = total ? Math.round(att.reduce((s,a) => s+a.pct, 0) / total) : 0;
  const streak  = stats.streak;
  const recent  = att.slice(-10);
  const barsHtml = recent.map(a => `<div class="bar-col"><span class="bar-pct-lbl">${a.pct}%</span><div class="bar-fill ${a.pct>=90?'bar-champion':''}" style="height:${a.pct}%"></div></div>`).join('');
  const best = total ? att.reduce((b,a) => a.pct>b.pct?a:b) : null;
  const levelHtml = best ? ['easy','medium','hard'].map(lvl => {
    const max = lvl==='easy'?5:lvl==='medium'?10:15;
    const got = best.byLevel[lvl]||0;
    const pct = Math.round(got/max*100);
    const color = lvl==='easy'?'var(--easy)':lvl==='medium'?'var(--medium)':'var(--hard)';
    return `<div class="level-row"><span class="level-row-label" style="color:${color}">${lvl.charAt(0).toUpperCase()+lvl.slice(1)}</span><div class="level-track"><div class="level-fill" style="width:${pct}%;background:${color}"></div></div><span class="level-pct">${got}/${max}</span></div>`;
  }).join('') : '';
  const weakQ = Object.entries(stats.questions).filter(([,v]) => v.seen>=2 && v.missed>0).sort(([,a],[,b]) => (b.missed/b.seen)-(a.missed/a.seen)).slice(0,4);
  const weakHtml = weakQ.map(([idx,v]) => {
    const q = questions[parseInt(idx)];
    const short = q.text.length>65 ? q.text.substring(0,65)+'…' : q.text;
    return `<li class="weak-item"><span style="flex:1">${short}</span><span class="miss-badge">missed ${v.missed}/${v.seen}</span></li>`;
  }).join('');
  const overlay = document.createElement('div');
  overlay.className = 'progress-panel';
  overlay.id = 'progress-panel-overlay';
  overlay.innerHTML = `
    <div class="progress-panel-inner">
      <div class="panel-header"><span class="panel-title">📊 My Progress — Decimals</span><button class="panel-close" onclick="closeProgressPanel()">✕</button></div>
      <div class="streak-card"><span class="streak-fire">🔥</span><div><div class="streak-num">${streak.current} day${streak.current!==1?'s':''}</div><div class="streak-lbl">Current streak &nbsp;·&nbsp; Best: ${streak.best} day${streak.best!==1?'s':''}</div></div></div>
      <div class="stat-grid">
        <div class="stat-card"><div class="s-num">${total}</div><div class="s-lbl">Quizzes</div></div>
        <div class="stat-card"><div class="s-num">${bestPct}%</div><div class="s-lbl">Best Score</div></div>
        <div class="stat-card"><div class="s-num">${avgPct}%</div><div class="s-lbl">Average</div></div>
      </div>
      ${total===0?'<div class="empty-state">Complete your first quiz to see stats here! 🎯</div>':''}
      ${recent.length?`<div class="panel-section-title">Recent Attempts</div><div class="bar-chart">${barsHtml}</div>`:''}
      ${best?`<div class="panel-section-title">Best Attempt — By Difficulty</div><div class="level-bars">${levelHtml}</div>`:''}
      ${weakHtml?`<div class="panel-section-title">Questions to Practise More</div><ul class="weak-list">${weakHtml}</ul>`:''}
    </div>`;
  overlay.addEventListener('click', e => { if (e.target===overlay) closeProgressPanel(); });
  document.body.appendChild(overlay);
}
function closeProgressPanel() { document.getElementById('progress-panel-overlay')?.remove(); }

function startTimer() {
  timerSeconds = 0; clearInterval(timerInterval);
  document.getElementById('timer').textContent = '⏱ 0:00';
  timerInterval = setInterval(() => { timerSeconds++; document.getElementById('timer').textContent = '⏱ ' + formatTime(timerSeconds); }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }
function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function restartQuiz() {
  current = 0; attempts = 0; scoreCorrect = 0; scoreWrong = 0; scoreDone = 0;
  quizQResults = new Array(30).fill(null); quizStartTime = Date.now();
  updateScore(); startTimer(); renderQuestion(0);
}

updateScore(); startTimer(); renderQuestion(0);
</script>

</html>
