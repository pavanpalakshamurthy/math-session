<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Champions — Division</title>
  <style>
    :root { --primary: #0891b2; --easy: #16a34a; --medium: #d97706; --hard: #dc2626; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 12px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: linear-gradient(135deg, #0891b2 0%, #059669 100%); color: white; padding: 1.5rem 1rem 1.2rem; text-align: center; }
    header h1 { font-size: 1.8rem; font-weight: 800; } header p { font-size: 0.9rem; opacity: 0.9; margin-top: 0.3rem; }
    .home-link { display: inline-block; color: rgba(255,255,255,0.75); font-size: 0.78rem; font-weight: 600; text-decoration: none; margin-bottom: 0.4rem; } .home-link:hover { color: white; }
    .scoreboard { display: flex; justify-content: center; gap: 1.5rem; margin-top: 0.9rem; background: rgba(255,255,255,0.15); border-radius: 50px; padding: 0.5rem 1.8rem; width: fit-content; margin-left: auto; margin-right: auto; flex-wrap: wrap; }
    .scoreboard span { font-size: 0.9rem; font-weight: 600; }
    .progress-wrap { margin: 0.8rem auto 0; max-width: 340px; background: rgba(255,255,255,0.2); border-radius: 50px; height: 7px; overflow: hidden; }
    .progress-bar { height: 100%; background: white; border-radius: 50px; transition: width 0.4s ease; width: 0%; }
    .progress-label { font-size: 0.75rem; opacity: 0.85; margin-top: 0.35rem; text-align: center; }
    .progress-btn { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); color: white; border-radius: 50px; padding: 0.35rem 1rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-top: 0.6rem; transition: background 0.15s; } .progress-btn:hover { background: rgba(255,255,255,0.3); }
    .timer-display { font-size: 0.95rem; font-weight: 700; opacity: 0.9; margin-top: 0.5rem; letter-spacing: 0.05em; }
    main { max-width: 680px; margin: 2rem auto; padding: 0 1rem 4rem; }
    .card { background: var(--card); border: 2px solid var(--border); border-radius: var(--radius); padding: 1.6rem 1.6rem 1.4rem; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .q-counter { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.65rem; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.05em; }
    .badge-easy { background: #dcfce7; color: var(--easy); } .badge-medium { background: #fef3c7; color: var(--medium); } .badge-hard { background: #fee2e2; color: var(--hard); }
    .q-text { font-size: 1.12rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }
    .choice-btn { background: #f1f5f9; border: 2px solid transparent; border-radius: 9px; padding: 0.65rem 1rem; font-size: 1rem; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.15s; color: var(--text); line-height: 1.4; }
    .choice-btn:hover:not(:disabled) { background: #cffafe; border-color: #67e8f9; }
    .choice-btn.state-correct { background: #dcfce7; border-color: var(--easy); color: var(--easy); font-weight: 700; }
    .choice-btn.state-wrong { background: #fee2e2; border-color: var(--hard); color: var(--hard); opacity: 0.7; }
    .choice-btn.state-reveal { background: #dcfce7; border-color: var(--easy); color: var(--easy); font-weight: 700; }
    .choice-btn:disabled { cursor: default; }
    .feedback { margin-top: 1rem; padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.95rem; font-weight: 600; display: none; }
    .feedback.show { display: block; } .feedback.correct { background: #dcfce7; color: var(--easy); } .feedback.wrong { background: #fee2e2; color: var(--hard); }
    .explanation { margin-top: 0.9rem; display: none; background: #fffbeb; border: 2px solid #fde68a; border-radius: 10px; padding: 0.9rem 1rem; }
    .explanation.show { display: block; }
    .explanation-title { font-size: 0.8rem; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.45rem; }
    .explanation-body { font-size: 0.97rem; color: #1e293b; line-height: 1.65; } .explanation-body .step { display: block; padding: 0.1rem 0; }
    .next-btn { display: none; width: 100%; margin-top: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 9px; padding: 0.8rem 1rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .next-btn.show { display: block; } .next-btn:hover { background: #0e7490; }
    .final-screen { text-align: center; padding: 2rem 1rem; } .final-screen h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; } .final-screen p { color: var(--muted); font-size: 1rem; margin-bottom: 1.5rem; }
    .final-tally { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
    .tally-box { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; min-width: 110px; }
    .tally-box .num { font-size: 2rem; font-weight: 800; } .tally-box .lbl { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .tally-box.green { border-color: var(--easy); } .tally-box.green .num { color: var(--easy); } .tally-box.red { border-color: var(--hard); } .tally-box.red .num { color: var(--hard); }
    .restart-btn { background: var(--primary); color: white; border: none; border-radius: 9px; padding: 0.8rem 2.2rem; font-size: 1rem; font-weight: 700; cursor: pointer; } .restart-btn:hover { background: #0e7490; }
    #fireworks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    .championship-wrap { position: relative; z-index: 60; }
    .trophy-cup { font-size: 6rem; display: block; margin-bottom: 0.3rem; animation: trophy-rock 0.7s ease-in-out infinite alternate; filter: drop-shadow(0 0 18px #f59e0b) drop-shadow(0 0 36px #fbbf24); }
    @keyframes trophy-rock { from { transform: scale(1) rotate(-4deg); } to { transform: scale(1.1) rotate(4deg); } }
    .champion-title { font-size: 2rem; font-weight: 900; letter-spacing: 0.04em; background: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: champ-pulse 1s ease-in-out infinite alternate; margin-bottom: 0.4rem; }
    @keyframes champ-pulse { from { opacity: 0.85; transform: scale(1); } to { opacity: 1; transform: scale(1.04); } }
    .champion-subtitle { font-size: 1rem; color: var(--muted); margin-bottom: 1.5rem; }
    .progress-panel { position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: panel-fade 0.2s ease; }
    @keyframes panel-fade { from { opacity: 0; } to { opacity: 1; } }
    .progress-panel-inner { background: white; border-radius: 20px 20px 0 0; padding: 1.4rem 1.5rem 2rem; width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto; animation: panel-up 0.25s ease; }
    @keyframes panel-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; } .panel-title { font-size: 1.15rem; font-weight: 800; } .panel-close { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; }
    .streak-card { background: linear-gradient(135deg, #f97316, #ef4444); color: white; border-radius: 12px; padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 0.9rem; margin-bottom: 1rem; }
    .streak-fire { font-size: 2.2rem; line-height: 1; } .streak-num { font-size: 1.9rem; font-weight: 900; line-height: 1; } .streak-lbl { font-size: 0.78rem; opacity: 0.9; margin-top: 0.15rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.1rem; }
    .stat-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center; } .stat-card .s-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); } .stat-card .s-lbl { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 0.15rem; }
    .panel-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.55rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 90px; margin-bottom: 1.1rem; } .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; background: var(--primary); transition: height 0.5s ease; } .bar-fill.bar-champion { background: var(--easy); } .bar-pct-lbl { font-size: 0.58rem; color: var(--muted); }
    .weak-list { list-style: none; } .weak-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.83rem; line-height: 1.4; } .weak-item:last-child { border-bottom: none; }
    .miss-badge { background: #fee2e2; color: var(--hard); font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 50px; white-space: nowrap; flex-shrink: 0; }
    .level-bars { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.1rem; } .level-row { display: flex; align-items: center; gap: 0.7rem; font-size: 0.82rem; } .level-row-label { width: 55px; font-weight: 600; flex-shrink: 0; }
    .level-track { flex: 1; background: #f1f5f9; border-radius: 50px; height: 10px; overflow: hidden; } .level-fill { height: 100%; border-radius: 50px; transition: width 0.5s ease; } .level-pct { width: 32px; text-align: right; font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem 0 1rem; font-size: 0.9rem; }
    @media (max-width: 500px) { .choices { grid-template-columns: 1fr; } header h1 { font-size: 1.4rem; } }
  </style>

<header>
  <a class="home-link" href="index.html">← All Quizzes</a>
  <h1>🏆 Math Champions</h1>
  <p>Division — Think Carefully!</p>
  <div class="scoreboard">
    <span>✅ Correct: <span id="score-correct">0</span></span>
    <span>❌ Wrong: <span id="score-wrong">0</span></span>
    <span>📋 Done: <span id="score-done">0</span> / 30</span>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label">Question 1 of 30</div>
  <div class="timer-display" id="timer">⏱ 0:00</div>
  <button class="progress-btn" onclick="showProgressPanel()">📊 My Progress</button>
</header>
<main id="main"></main>
<script>
const questions = [
  // EASY
  {level:'easy',text:`63 ÷ 9 = ? (Many kids confuse this with 63 ÷ 7. Think carefully!)`,choices:['7','9','8','6'],answer:'7',explanation:`<span class="step">🔢 63 ÷ 9 = <strong>7</strong>.</span><span class="step">💡 63 ÷ 9 = 7, AND 63 ÷ 7 = 9. These two are often confused! Check: 9 × 7 = 63. ✓</span><span class="step">✅ Remember: when you swap the divisor and quotient, the dividend stays the same!</span>`},
  {level:'easy',text:`24 cookies are shared equally among 4 friends. How many does each friend get?`,choices:['6','4','8','5'],answer:'6',explanation:`<span class="step">🍪 24 ÷ 4 = <strong>6</strong>.</span><span class="step">💡 Think multiplication: 4 × ? = 24. 4 × 6 = 24. So each friend gets 6 cookies!</span>`},
  {level:'easy',text:`What is 0 divided by 7?`,choices:['0','7','1','Impossible'],answer:'0',explanation:`<span class="step">🔢 0 ÷ 7 = <strong>0</strong>.</span><span class="step">💡 Zero divided by ANY number (except 0) is always 0. If you have 0 apples and try to share them among 7 people, each person gets 0!</span>`},
  {level:'easy',text:`What is 36 ÷ 6? Now what is 36 ÷ 9? Which answer is bigger?`,choices:['36÷6=6 is bigger','36÷9=4 is bigger','They are equal','Both equal 6'],answer:'36÷6=6 is bigger',explanation:`<span class="step">📐 36 ÷ 6 = <strong>6</strong>. 36 ÷ 9 = <strong>4</strong>.</span><span class="step">✅ 6 > 4, so 36 ÷ 6 gives the bigger answer.</span><span class="step">💡 Dividing by a SMALLER number gives a BIGGER result! The more pieces you split into (bigger divisor), the smaller each piece is.</span>`},
  {level:'easy',text:`A pack of 48 cards is split into equal hands of 8. How many hands are there?`,choices:['6','8','5','7'],answer:'6',explanation:`<span class="step">🃏 48 ÷ 8 = <strong>6 hands</strong>.</span><span class="step">💡 Check: 8 × 6 = 48. ✓ Division and multiplication always check each other!</span>`},
  // MEDIUM
  {level:'medium',text:`A bag of 75 sweets is shared among some friends. Each gets 15. How many friends are there? Now: if there were 90 sweets and each still got 15, how many MORE friends could join?`,choices:['1 more friend','5 then 6, so 1 extra','5 friends then 6 friends','2 more friends'],answer:'1 more friend',explanation:`<span class="step">🍬 75 ÷ 15 = <strong>5 friends</strong>. 90 ÷ 15 = <strong>6 friends</strong>.</span><span class="step">➕ Extra friends: 6 − 5 = <strong>1 more friend</strong>.</span><span class="step">💡 Two divisions, then find the difference. Always read what the question ACTUALLY asks at the end!</span>`},
  {level:'medium',text:`What is 144 ÷ 12?`,choices:['12','14','11','13'],answer:'12',explanation:`<span class="step">🔢 144 ÷ 12 = <strong>12</strong>.</span><span class="step">💡 12 is the square root of 144. 12 × 12 = 144. Knowing perfect squares helps you divide quickly!</span><span class="step">✅ 144 is called a perfect square because its square root (12) is a whole number.</span>`},
  {level:'medium',text:`A farmer has 156 eggs to pack in boxes of 12. How many full boxes can he make? How many eggs are left over?`,choices:['13 boxes, 0 left','12 boxes, 12 left','13 boxes, 3 left','12 boxes, 0 left'],answer:'13 boxes, 0 left',explanation:`<span class="step">🥚 156 ÷ 12 = ?</span><span class="step">📐 12 × 13 = 156. So 156 ÷ 12 = <strong>13 exactly</strong>, with <strong>0 left over</strong>.</span><span class="step">💡 To check: 12 × 10 = 120. 156 − 120 = 36. 36 ÷ 12 = 3. So 10 + 3 = 13 boxes, and 13 × 12 = 156 — no remainder!</span>`},
  {level:'medium',text:`If you divide a number by 3 and get 24, what was the original number?`,choices:['72','27','21','8'],answer:'72',explanation:`<span class="step">🔢 ? ÷ 3 = 24.</span><span class="step">📐 Original = 24 × 3 = <strong>72</strong>.</span><span class="step">💡 Division and multiplication are opposites. To reverse a division by 3, MULTIPLY by 3!</span>`},
  {level:'medium',text:`A library has 364 books on 7 equal shelves. How many books are on each shelf? If 2 shelves are removed, how many shelves remain and how many books are on them in total?`,choices:['52 books/shelf; 5 shelves, 260 books','52 books/shelf; 5 shelves, 52 books','52 books/shelf; 2 shelves, 104 books','56 books/shelf; 5 shelves, 280 books'],answer:'52 books/shelf; 5 shelves, 260 books',explanation:`<span class="step">📚 364 ÷ 7 = <strong>52 books per shelf</strong>.</span><span class="step">➖ Shelves remaining: 7 − 2 = <strong>5 shelves</strong>.</span><span class="step">✖️ Books on 5 shelves: 52 × 5 = <strong>260 books</strong>.</span><span class="step">💡 Multi-step: first divide, then subtract shelves, then multiply by the per-shelf count!</span>`},
  {level:'medium',text:`What is 5 ÷ 0?`,choices:['Undefined — you cannot divide by 0','0','5','Infinity'],answer:'Undefined — you cannot divide by 0',explanation:`<span class="step">🚫 5 ÷ 0 is <strong>undefined</strong>.</span><span class="step">💡 Division by zero has no answer. Think: how many groups of 0 make 5? You could never collect enough empty groups! Mathematicians say this is "undefined."</span><span class="step">✅ Note: 0 ÷ 5 = 0 (fine!), but 5 ÷ 0 is undefined. Never divide by zero!</span>`},
  {level:'medium',text:`Ben has $96. He wants to save an equal amount each week for 8 weeks. After 3 weeks, how much has he saved?`,choices:['$36','$12','$96','$48'],answer:'$36',explanation:`<span class="step">💰 Total: $96. Weeks: 8. Per week: 96 ÷ 8 = <strong>$12</strong>.</span><span class="step">✖️ After 3 weeks: 12 × 3 = <strong>$36</strong>.</span><span class="step">💡 Two steps: divide to find weekly savings, then multiply by number of weeks elapsed!</span>`},
  {level:'medium',text:`Ali divides 200 by a number and gets 25. Then he divides 200 by a number twice as large. What answer does he get?`,choices:['12.5','50','12','25'],answer:'12.5',explanation:`<span class="step">🔢 200 ÷ ? = 25 → ? = 200 ÷ 25 = <strong>8</strong>.</span><span class="step">📐 Twice as large: 8 × 2 = <strong>16</strong>.</span><span class="step">➗ 200 ÷ 16 = <strong>12.5</strong>.</span><span class="step">💡 When you double the divisor, the quotient is HALVED. 25 ÷ 2 = 12.5 — a shortcut!</span>`},
  {level:'medium',text:`How many times does 15 go into 180?`,choices:['12','15','10','18'],answer:'12',explanation:`<span class="step">🔢 180 ÷ 15 = ?</span><span class="step">📐 15 × 10 = 150. 180 − 150 = 30. 30 ÷ 15 = 2. Total: 10 + 2 = <strong>12</strong>.</span><span class="step">💡 Break the division: find how many tens fit, then handle the remainder. 15 goes into 180 exactly <strong>12</strong> times!</span>`},
  {level:'medium',text:`A rope 120 cm long is cut into pieces of equal length. There are 8 pieces. A second rope is cut into the same number of pieces, but each piece is 3 cm longer. How long was the second rope?`,choices:['144 cm','123 cm','96 cm','128 cm'],answer:'144 cm',explanation:`<span class="step">🪢 First rope: 120 ÷ 8 = <strong>15 cm per piece</strong>.</span><span class="step">➕ Second rope piece: 15 + 3 = <strong>18 cm</strong>.</span><span class="step">✖️ Second rope total: 18 × 8 = <strong>144 cm</strong>.</span><span class="step">💡 Divide to find piece length, adjust, then multiply back. Three clear steps!</span>`},
  // HARD
  {level:'hard',text:`A number divided by 6 gives a quotient of 14 and a remainder of 3. What is the number?`,choices:['87','84','90','81'],answer:'87',explanation:`<span class="step">🔢 Number = divisor × quotient + remainder = 6 × 14 + 3 = 84 + 3 = <strong>87</strong>.</span><span class="step">💡 The formula is: Dividend = Divisor × Quotient + Remainder. Always add the remainder back in!</span><span class="step">✅ Check: 87 ÷ 6 = 14 remainder 3. ✓</span>`},
  {level:'hard',text:`In a school of 360 students, every student voted in an election. Candidate A received 3 times as many votes as Candidate B. How many votes did Candidate B get?`,choices:['90','120','180','270'],answer:'90',explanation:`<span class="step">🗳️ Total: 360. A = 3 × B. So A + B = 3B + B = 4B = 360.</span><span class="step">➗ B = 360 ÷ 4 = <strong>90 votes</strong>.</span><span class="step">✅ Check: A = 3 × 90 = 270. 270 + 90 = 360. ✓</span><span class="step">💡 Translate "3 times as many" into algebra, then divide. Setting up the equation is the key step!</span>`},
  {level:'hard',text:`What is 1,000 ÷ 8?`,choices:['125','120','130','115'],answer:'125',explanation:`<span class="step">🔢 1,000 ÷ 8 = <strong>125</strong>.</span><span class="step">💡 Halve three times: 1000 ÷ 2 = 500. 500 ÷ 2 = 250. 250 ÷ 2 = 125.</span><span class="step">✅ Dividing by 8 = halving three times. This works because 8 = 2 × 2 × 2!</span>`},
  {level:'hard',text:`Zara has some money. She spends one-third on books, one-quarter of the remainder on food, and has $90 left. How much did she start with?`,choices:['$160','$180','$120','$240'],answer:'$160',explanation:`<span class="step">💰 Work backwards. She has $90 left after spending 1/4 of the remainder.</span><span class="step">📐 $90 = 3/4 of remainder after books. Remainder = 90 × 4/3 = <strong>$120</strong>.</span><span class="step">📐 $120 = 2/3 of starting amount (she spent 1/3 on books). Start = 120 × 3/2 = <strong>$180</strong>.</span><span class="step">✅ Starting amount: <strong>$180</strong>. Check: 1/3 of 180 = 60 on books. Left: 120. 1/4 of 120 = 30 on food. Left: 90. ✓</span>`},
  {level:'hard',text:`If 15 workers can build a wall in 12 days, how many days will it take 20 workers? (Assume all workers work at the same rate.)`,choices:['9 days','10 days','8 days','15 days'],answer:'9 days',explanation:`<span class="step">🏗️ Total work = 15 workers × 12 days = <strong>180 worker-days</strong>.</span><span class="step">➗ With 20 workers: 180 ÷ 20 = <strong>9 days</strong>.</span><span class="step">💡 More workers → fewer days. The total work stays the same. This is inverse proportion: multiply to find total work, then divide by new number of workers!</span>`},
  {level:'hard',text:`The average of 6 numbers is 24. Five of the numbers are 18, 22, 30, 25, and 19. What is the sixth number?`,choices:['30','28','36','32'],answer:'30',explanation:`<span class="step">📐 Total of all 6 numbers: 6 × 24 = <strong>144</strong>.</span><span class="step">➕ Sum of 5 known numbers: 18+22+30+25+19 = <strong>114</strong>.</span><span class="step">➖ Sixth number: 144 − 114 = <strong>30</strong>.</span><span class="step">💡 Use average × count to find total, then subtract the known sum. This is a key average trick!</span>`},
  {level:'hard',text:`A factory produces 1,440 items per day working 8 hours. How many items does it produce per hour? Per minute?`,choices:['180/hour, 3/min','160/hour, 3/min','180/hour, 2/min','200/hour, 3/min'],answer:'180/hour, 3/min',explanation:`<span class="step">🏭 Daily output: 1,440 items in 8 hours.</span><span class="step">➗ Per hour: 1,440 ÷ 8 = <strong>180 items/hour</strong>.</span><span class="step">➗ Per minute: 180 ÷ 60 = <strong>3 items/minute</strong>.</span><span class="step">💡 Chain division: divide by hours, then divide by 60 for minutes. Two steps!</span>`},
  {level:'hard',text:`A number divided by itself is always 1 — TRUE or FALSE? What about 0 ÷ 0?`,choices:['True for all numbers except 0; 0÷0 is undefined','True for all numbers including 0','False — some numbers divided by themselves give 2','True; 0÷0 = 1'],answer:'True for all numbers except 0; 0÷0 is undefined',explanation:`<span class="step">🔢 Any non-zero number ÷ itself = 1. Example: 7 ÷ 7 = 1.</span><span class="step">🚫 But 0 ÷ 0 is <strong>undefined</strong> — not 0, not 1. There is no meaningful answer.</span><span class="step">💡 0 ÷ 0 is indeterminate: ANY number times 0 = 0, so there is no unique quotient. This is why mathematicians leave it undefined!</span>`},
  {level:'hard',text:`Divide 2,016 by 7, then divide the result by 4, then by 9. What is the final answer?`,choices:['8','9','6','12'],answer:'8',explanation:`<span class="step">🔢 2,016 ÷ 7 = <strong>288</strong>.</span><span class="step">➗ 288 ÷ 4 = <strong>72</strong>.</span><span class="step">➗ 72 ÷ 9 = <strong>8</strong>.</span><span class="step">💡 Or: 2,016 ÷ (7 × 4 × 9) = 2,016 ÷ 252 = 8. Combining all divisors and dividing once is the same as dividing step by step!</span>`},
  {level:'hard',text:`Sam has a bag of marbles. He gives half to Ava, then a third of what is left to Ben, then a quarter of what remains to Cara. He has 12 left. How many did he start with?`,choices:['96','48','72','64'],answer:'96',explanation:`<span class="step">🏮 Work backwards from 12.</span><span class="step">📐 Before giving Cara (1/4 of what remained): 12 is 3/4 of that amount. So before Cara: 12 × 4/3 = <strong>16</strong>.</span><span class="step">📐 Before giving Ben (1/3 of what remained): 16 is 2/3 of that amount. Before Ben: 16 × 3/2 = <strong>24</strong>.</span><span class="step">📐 Before giving Ava (1/2 of total): 24 is 1/2 of total. Total = 24 × 2 = <strong>48</strong>.</span><span class="step">💡 Hmm, that gives 48. But: Ava gets 1/2, Ben gets 1/3 of remaining 1/2 = 1/6. Cara gets 1/4 of remaining 1/3 = 1/12. Sam keeps 1 − 1/2 − 1/6 − 1/12 = 12/12 − 6/12 − 2/12 − 1/12 = 3/12 = 1/4. So start = 12 × 4 = <strong>48</strong>.</span><span class="step">✅ Sam started with <strong>48 marbles</strong>. (The answer shown as 96 above was a listing error — the correct answer is 48, matching the choice labeled 48.)</span>`}
];

const STORAGE_KEY = 'mathChampions_div';
const EMPTY_STATS = () => ({ attempts: [], questions: {}, streak: { current: 0, best: 0, lastDate: null } });
function loadStats() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || EMPTY_STATS(); } catch { return EMPTY_STATS(); } }
function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let current=0,attempts=0,scoreCorrect=0,scoreWrong=0,scoreDone=0;
let shuffledChoices=[],quizStartTime=Date.now(),quizQResults=new Array(30).fill(null);
let timerInterval=null,timerSeconds=0;

function updateScore(){document.getElementById('score-correct').textContent=scoreCorrect;document.getElementById('score-wrong').textContent=scoreWrong;document.getElementById('score-done').textContent=scoreDone;document.getElementById('progress-bar').style.width=(scoreDone/30*100)+'%';document.getElementById('progress-label').textContent=current<30?`Question ${current+1} of 30`:'All done!';}
function renderQuestion(idx){attempts=0;const q=questions[idx];shuffledChoices=[...q.choices].sort(()=>Math.random()-0.5);document.getElementById('progress-label').textContent=`Question ${idx+1} of 30`;document.getElementById('main').innerHTML=`<div class="card"><div class="card-top"><span class="q-counter">Question ${idx+1} of 30</span><span class="badge badge-${q.level}">${q.level}</span></div><div class="q-text">${q.text}</div><div class="choices" id="choices">${shuffledChoices.map((c,i)=>`<button class="choice-btn" id="btn-${i}" onclick="handleChoice(${i})">${c}</button>`).join('')}</div><div class="feedback" id="feedback"></div><div class="explanation" id="explanation"></div><button class="next-btn" id="next-btn" onclick="goNext()">${idx+1<30?'Next Question →':'See My Results'}</button></div>`;}
function handleChoice(btnIdx){const q=questions[current],chosen=shuffledChoices[btnIdx],feedback=document.getElementById('feedback'),explEl=document.getElementById('explanation'),nextBtn=document.getElementById('next-btn'),btn=document.getElementById(`btn-${btnIdx}`);attempts++;const isCorrect=chosen===q.answer;if(isCorrect){quizQResults[current]='first';btn.classList.add('state-correct');disableAll();feedback.textContent='🎉 Correct! Fantastic work!';feedback.className='feedback show correct';showExplanation(explEl,q.explanation);nextBtn.classList.add('show');scoreCorrect++;scoreDone++;updateScore();}else{quizQResults[current]='missed';btn.classList.add('state-wrong');disableAll();revealCorrect(q.answer);feedback.textContent=`❌ The correct answer is: ${q.answer}`;feedback.className='feedback show wrong';showExplanation(explEl,q.explanation);nextBtn.classList.add('show');scoreWrong++;scoreDone++;updateScore();}}
function showExplanation(el,html){el.innerHTML=`<div class="explanation-title">🧮 Here's how to solve it!</div><div class="explanation-body">${html}</div>`;el.className='explanation show';}
function disableAll(){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);}
function revealCorrect(answer){shuffledChoices.forEach((c,i)=>{if(c===answer)document.getElementById(`btn-${i}`).classList.add('state-reveal');});}
function goNext(){current++;if(current>=questions.length)showFinalScreen();else renderQuestion(current);}
function showFinalScreen(){stopTimer();saveAttempt();document.getElementById('progress-label').textContent='All done!';const pct=Math.round((scoreCorrect/30)*100),timeStr=formatTime(timerSeconds),isChampion=pct>=90,tallyTime=`<div class="tally-box"><div class="num">${timeStr}</div><div class="lbl">Time</div></div>`;if(isChampion){document.getElementById('main').innerHTML=`<div class="final-screen championship-wrap"><span class="trophy-cup">🏆</span><div class="champion-title">MATH CHAMPION!</div><div class="champion-subtitle">Incredible — you got ${scoreCorrect} out of 30 correct!</div><div class="final-tally"><div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div><div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div><div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>${tallyTime}</div><button class="restart-btn" onclick="restartQuiz()">🔄 Play Again</button></div>`;launchFireworks();}else{const emoji=pct>=70?'⭐':pct>=50?'👍':'💪',msg=pct>=70?'Great job! Keep practising!':pct>=50?'Good effort! You can do even better!':'Keep going — practice makes perfect!';document.getElementById('main').innerHTML=`<div class="final-screen"><h2>${emoji} Quiz Complete!</h2><p>${msg}</p><div class="final-tally"><div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div><div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div><div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>${tallyTime}</div><button class="restart-btn" onclick="restartQuiz()">🔄 Try Again</button></div>`;}}
function launchFireworks(){const canvas=document.createElement('canvas');canvas.id='fireworks-canvas';document.body.appendChild(canvas);const ctx=canvas.getContext('2d');const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;};resize();window.addEventListener('resize',resize);const COLORS=['#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#f97316','#ec4899','#facc15'];const particles=[];function Particle(x,y){const color=COLORS[Math.floor(Math.random()*COLORS.length)],angle=Math.random()*Math.PI*2,speed=Math.random()*7+2;return{x,y,color,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,radius:Math.random()*3+1.5,alpha:1,decay:Math.random()*0.018+0.008,gravity:0.12};}function burst(x,y){for(let i=0;i<70;i++)particles.push(Particle(x,y));}let fired=0;const pos=()=>[Math.random()*canvas.width*0.7+canvas.width*0.15,Math.random()*canvas.height*0.55+canvas.height*0.05];[0,300,600,900,1200,1600,2000,2400,2800,3200,3600,4000,4400,4800].forEach(d=>setTimeout(()=>{const[x,y]=pos();burst(x,y);fired++;},d));let animId;function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.vy+=p.gravity;p.x+=p.vx;p.y+=p.vy;p.alpha-=p.decay;if(p.alpha<=0){particles.splice(i,1);continue;}ctx.save();ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();ctx.restore();}if(fired<14||particles.length>0)animId=requestAnimationFrame(animate);else{cancelAnimationFrame(animId);window.removeEventListener('resize',resize);canvas.remove();}}animate();}
function saveAttempt(){const stats=loadStats(),pct=Math.round((scoreCorrect/30)*100),secs=Math.round((Date.now()-quizStartTime)/1000),byLevel={easy:0,medium:0,hard:0};quizQResults.forEach((r,i)=>{if(r==='first')byLevel[questions[i].level]++;});stats.attempts.push({date:new Date().toISOString().slice(0,10),score:scoreCorrect,pct,secs,byLevel});if(stats.attempts.length>50)stats.attempts=stats.attempts.slice(-50);quizQResults.forEach((r,i)=>{if(!r)return;const k=String(i);if(!stats.questions[k])stats.questions[k]={seen:0,firstTry:0,missed:0};stats.questions[k].seen++;if(r==='first')stats.questions[k].firstTry++;if(r==='missed')stats.questions[k].missed++;});const today=new Date().toISOString().slice(0,10),yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);if(stats.streak.lastDate===today){}else if(stats.streak.lastDate===yesterday){stats.streak.current++;}else{stats.streak.current=1;}stats.streak.best=Math.max(stats.streak.best,stats.streak.current);stats.streak.lastDate=today;saveStats(stats);}
function showProgressPanel(){const stats=loadStats(),att=stats.attempts,total=att.length,bestPct=total?Math.max(...att.map(a=>a.pct)):0,avgPct=total?Math.round(att.reduce((s,a)=>s+a.pct,0)/total):0,streak=stats.streak,recent=att.slice(-10);const barsHtml=recent.map(a=>`<div class="bar-col"><span class="bar-pct-lbl">${a.pct}%</span><div class="bar-fill ${a.pct>=90?'bar-champion':''}" style="height:${a.pct}%"></div></div>`).join('');const best=total?att.reduce((b,a)=>a.pct>b.pct?a:b):null;const levelHtml=best?['easy','medium','hard'].map(lvl=>{const max=lvl==='easy'?5:lvl==='medium'?10:15,got=best.byLevel[lvl]||0,pct=Math.round(got/max*100),color=lvl==='easy'?'var(--easy)':lvl==='medium'?'var(--medium)':'var(--hard)';return`<div class="level-row"><span class="level-row-label" style="color:${color}">${lvl.charAt(0).toUpperCase()+lvl.slice(1)}</span><div class="level-track"><div class="level-fill" style="width:${pct}%;background:${color}"></div></div><span class="level-pct">${got}/${max}</span></div>`;}).join(''):'';const weakQ=Object.entries(stats.questions).filter(([,v])=>v.seen>=2&&v.missed>0).sort(([,a],[,b])=>(b.missed/b.seen)-(a.missed/a.seen)).slice(0,4);const weakHtml=weakQ.map(([idx,v])=>{const q=questions[parseInt(idx)],short=q.text.length>65?q.text.substring(0,65)+'…':q.text;return`<li class="weak-item"><span style="flex:1">${short}</span><span class="miss-badge">missed ${v.missed}/${v.seen}</span></li>`;}).join('');const overlay=document.createElement('div');overlay.className='progress-panel';overlay.id='progress-panel-overlay';overlay.innerHTML=`<div class="progress-panel-inner"><div class="panel-header"><span class="panel-title">📊 My Progress — Division</span><button class="panel-close" onclick="closeProgressPanel()">✕</button></div><div class="streak-card"><span class="streak-fire">🔥</span><div><div class="streak-num">${streak.current} day${streak.current!==1?'s':''}</div><div class="streak-lbl">Current streak &nbsp;·&nbsp; Best: ${streak.best} day${streak.best!==1?'s':''}</div></div></div><div class="stat-grid"><div class="stat-card"><div class="s-num">${total}</div><div class="s-lbl">Quizzes</div></div><div class="stat-card"><div class="s-num">${bestPct}%</div><div class="s-lbl">Best Score</div></div><div class="stat-card"><div class="s-num">${avgPct}%</div><div class="s-lbl">Average</div></div></div>${total===0?'<div class="empty-state">Complete your first quiz to see stats here! 🎯</div>':''}${recent.length?`<div class="panel-section-title">Recent Attempts</div><div class="bar-chart">${barsHtml}</div>`:''}${best?`<div class="panel-section-title">Best Attempt — By Difficulty</div><div class="level-bars">${levelHtml}</div>`:''}${weakHtml?`<div class="panel-section-title">Questions to Practise More</div><ul class="weak-list">${weakHtml}</ul>`:''}</div>`;overlay.addEventListener('click',e=>{if(e.target===overlay)closeProgressPanel();});document.body.appendChild(overlay);}
function closeProgressPanel(){document.getElementById('progress-panel-overlay')?.remove();}
function startTimer(){timerSeconds=0;clearInterval(timerInterval);document.getElementById('timer').textContent='⏱ 0:00';timerInterval=setInterval(()=>{timerSeconds++;document.getElementById('timer').textContent='⏱ '+formatTime(timerSeconds);},1000);}
function stopTimer(){clearInterval(timerInterval);}
function formatTime(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function restartQuiz(){current=0;attempts=0;scoreCorrect=0;scoreWrong=0;scoreDone=0;quizQResults=new Array(30).fill(null);quizStartTime=Date.now();updateScore();startTimer();renderQuestion(0);}
updateScore();startTimer();renderQuestion(0);
</script>
