<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Champions — Percentages</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --easy: #16a34a;
      --medium: #d97706;
      --hard: #dc2626;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 100%);
      color: white;
      padding: 1.5rem 1rem 1.2rem;
      text-align: center;
    }
    header h1 { font-size: 1.8rem; font-weight: 800; }
    header p  { font-size: 0.9rem; opacity: 0.9; margin-top: 0.3rem; }

    .home-link {
      display: inline-block;
      color: rgba(255,255,255,0.75);
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 0.4rem;
    }
    .home-link:hover { color: white; }

    .scoreboard {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 0.9rem;
      background: rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 0.5rem 1.8rem;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      flex-wrap: wrap;
    }
    .scoreboard span { font-size: 0.9rem; font-weight: 600; }

    .progress-wrap {
      margin: 0.8rem auto 0;
      max-width: 340px;
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      height: 7px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: white;
      border-radius: 50px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-label {
      font-size: 0.75rem;
      opacity: 0.85;
      margin-top: 0.35rem;
      text-align: center;
    }
    .progress-btn {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 50px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.6rem;
      transition: background 0.15s;
    }
    .progress-btn:hover { background: rgba(255,255,255,0.3); }

    main {
      max-width: 680px;
      margin: 2rem auto;
      padding: 0 1rem 4rem;
    }

    .card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem 1.6rem 1.4rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .q-counter { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
    .badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.65rem;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-easy   { background: #dcfce7; color: var(--easy); }
    .badge-medium { background: #fef3c7; color: var(--medium); }
    .badge-hard   { background: #fee2e2; color: var(--hard); }

    .timer-display {
      font-size: 0.95rem;
      font-weight: 700;
      opacity: 0.9;
      margin-top: 0.5rem;
      letter-spacing: 0.05em;
    }

    .q-text { font-size: 1.12rem; line-height: 1.65; color: var(--text); margin-bottom: 1rem; }

    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; }
    .choice-btn {
      background: #f1f5f9;
      border: 2px solid transparent;
      border-radius: 9px;
      padding: 0.65rem 1rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      color: var(--text);
      line-height: 1.4;
    }
    .choice-btn:hover:not(:disabled) { background: #e0f2fe; border-color: #7dd3fc; }
    .choice-btn.state-correct { background: #dcfce7; border-color: var(--easy); color: var(--easy); font-weight: 700; }
    .choice-btn.state-wrong   { background: #fee2e2; border-color: var(--hard); color: var(--hard); opacity: 0.7; }
    .choice-btn.state-reveal  { background: #dcfce7; border-color: var(--easy); color: var(--easy); font-weight: 700; }
    .choice-btn:disabled { cursor: default; }

    .feedback {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
    }
    .feedback.show  { display: block; }
    .feedback.correct { background: #dcfce7; color: var(--easy); }
    .feedback.wrong   { background: #fee2e2; color: var(--hard); }

    .explanation {
      margin-top: 0.9rem;
      display: none;
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: 10px;
      padding: 0.9rem 1rem;
    }
    .explanation.show { display: block; }
    .explanation-title { font-size: 0.8rem; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.45rem; }
    .explanation-body  { font-size: 0.97rem; color: #1e293b; line-height: 1.65; }
    .explanation-body .step { display: block; padding: 0.1rem 0; }

    .next-btn {
      display: none;
      width: 100%;
      margin-top: 1.2rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .next-btn.show { display: block; }
    .next-btn:hover { background: #0284c7; }

    /* ── Final screen ── */
    .final-screen { text-align: center; padding: 2rem 1rem; }
    .final-screen h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
    .final-screen p  { color: var(--muted); font-size: 1rem; margin-bottom: 1.5rem; }
    .final-tally { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1.8rem; flex-wrap: wrap; }
    .tally-box { background: white; border: 2px solid var(--border); border-radius: 12px; padding: 1rem 1.5rem; min-width: 110px; }
    .tally-box .num { font-size: 2rem; font-weight: 800; }
    .tally-box .lbl { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .tally-box.green { border-color: var(--easy); }
    .tally-box.green .num { color: var(--easy); }
    .tally-box.red   { border-color: var(--hard); }
    .tally-box.red .num { color: var(--hard); }
    .restart-btn {
      background: var(--primary);
      color: white; border: none; border-radius: 9px;
      padding: 0.8rem 2.2rem; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s;
    }
    .restart-btn:hover { background: #0284c7; }

    /* ── Championship ── */
    #fireworks-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
    .championship-wrap { position: relative; z-index: 60; }
    .trophy-cup {
      font-size: 6rem; display: block; margin-bottom: 0.3rem;
      animation: trophy-rock 0.7s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 18px #f59e0b) drop-shadow(0 0 36px #fbbf24);
    }
    @keyframes trophy-rock { from { transform: scale(1) rotate(-4deg); } to { transform: scale(1.1) rotate(4deg); } }
    .champion-title {
      font-size: 2rem; font-weight: 900; letter-spacing: 0.04em;
      background: linear-gradient(135deg, #f59e0b 0%, #ef4444 50%, #8b5cf6 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: champ-pulse 1s ease-in-out infinite alternate; margin-bottom: 0.4rem;
    }
    @keyframes champ-pulse { from { opacity: 0.85; transform: scale(1); } to { opacity: 1; transform: scale(1.04); } }
    .champion-subtitle { font-size: 1rem; color: var(--muted); margin-bottom: 1.5rem; }

    /* ── Progress panel ── */
    .progress-panel { position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; animation: panel-fade 0.2s ease; }
    @keyframes panel-fade { from { opacity: 0; } to { opacity: 1; } }
    .progress-panel-inner { background: white; border-radius: 20px 20px 0 0; padding: 1.4rem 1.5rem 2rem; width: 100%; max-width: 680px; max-height: 88vh; overflow-y: auto; animation: panel-up 0.25s ease; }
    @keyframes panel-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; }
    .panel-title  { font-size: 1.15rem; font-weight: 800; }
    .panel-close  { background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; }
    .streak-card { background: linear-gradient(135deg, #f97316, #ef4444); color: white; border-radius: 12px; padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 0.9rem; margin-bottom: 1rem; }
    .streak-fire { font-size: 2.2rem; line-height: 1; }
    .streak-num  { font-size: 1.9rem; font-weight: 900; line-height: 1; }
    .streak-lbl  { font-size: 0.78rem; opacity: 0.9; margin-top: 0.15rem; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; margin-bottom: 1.1rem; }
    .stat-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center; }
    .stat-card .s-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .stat-card .s-lbl { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; margin-top: 0.15rem; }
    .panel-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.55rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 90px; margin-bottom: 1.1rem; }
    .bar-col  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-fill { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; background: var(--primary); transition: height 0.5s ease; }
    .bar-fill.bar-champion { background: var(--easy); }
    .bar-pct-lbl { font-size: 0.58rem; color: var(--muted); }
    .weak-list { list-style: none; }
    .weak-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.83rem; line-height: 1.4; }
    .weak-item:last-child { border-bottom: none; }
    .miss-badge { background: #fee2e2; color: var(--hard); font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 50px; white-space: nowrap; flex-shrink: 0; }
    .level-bars { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.1rem; }
    .level-row { display: flex; align-items: center; gap: 0.7rem; font-size: 0.82rem; }
    .level-row-label { width: 55px; font-weight: 600; flex-shrink: 0; }
    .level-track { flex: 1; background: #f1f5f9; border-radius: 50px; height: 10px; overflow: hidden; }
    .level-fill  { height: 100%; border-radius: 50px; transition: width 0.5s ease; }
    .level-pct   { width: 32px; text-align: right; font-size: 0.75rem; color: var(--muted); flex-shrink: 0; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem 0 1rem; font-size: 0.9rem; }

    @media (max-width: 500px) {
      .choices { grid-template-columns: 1fr; }
      header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<header>
  <a class="home-link" href="index.html">← All Quizzes</a>
  <h1>🏆 Math Champions</h1>
  <p>Percentages Word Problems</p>
  <div class="scoreboard">
    <span>✅ Correct: <span id="score-correct">0</span></span>
    <span>❌ Wrong: <span id="score-wrong">0</span></span>
    <span>📋 Done: <span id="score-done">0</span> / 30</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-label" id="progress-label">Question 1 of 30</div>
  <div class="timer-display" id="timer">⏱ 0:00</div>
  <button class="progress-btn" onclick="showProgressPanel()">📊 My Progress</button>
</header>

<main id="main"></main>

<script>
const questions = [
  // ── EASY (1–5) ────────────────────────────────────────────────────────────
  {
    level: 'easy',
    text: `Maya has 10 stickers. She gives 50% of them to her friend. How many stickers does she give away?`,
    hint: '50% means half. What is half of 10?',
    choices: ['5 stickers', '3 stickers', '2 stickers', '6 stickers'],
    answer: '5 stickers',
    explanation: `<span class="step">🌟 50% means exactly <strong>half</strong>.</span><span class="step">➗ Half of 10 = 10 ÷ 2 = <strong>5</strong>.</span><span class="step">💡 Whenever you see 50%, just divide by 2!</span>`
  },
  {
    level: 'easy',
    text: `A jar has 100 candies. 30% of them are red. How many candies are red?`,
    hint: 'With 100 things, the percentage IS the number.',
    choices: ['30 candies', '3 candies', '13 candies', '70 candies'],
    answer: '30 candies',
    explanation: `<span class="step">🍬 There are <strong>100</strong> candies total.</span><span class="step">💡 When there are exactly 100 things, the percentage is easy — 30% of 100 = <strong>30</strong>.</span><span class="step">✅ Per-cent literally means "per hundred," so 30% = 30 out of 100!</span>`
  },
  {
    level: 'easy',
    text: `Sam has $20. He spends 10% on a snack. How much does he spend?`,
    hint: '10% means one-tenth. Divide by 10.',
    choices: ['$2', '$10', '$5', '$1'],
    answer: '$2',
    explanation: `<span class="step">💵 Sam has <strong>$20</strong>.</span><span class="step">🔟 10% means one-tenth, so divide by 10: 20 ÷ 10 = <strong>2</strong>.</span><span class="step">💡 Quick trick: to find 10% of any number, just move the decimal point one place to the left!</span>`
  },
  {
    level: 'easy',
    text: `There are 20 flowers in a garden. 25% of them are red. How many flowers are red?`,
    hint: '25% means one-quarter. Divide by 4.',
    choices: ['5 flowers', '4 flowers', '8 flowers', '2 flowers'],
    answer: '5 flowers',
    explanation: `<span class="step">🌸 There are <strong>20 flowers</strong>.</span><span class="step">📐 25% = one-quarter = ÷ 4. So 20 ÷ 4 = <strong>5</strong>.</span><span class="step">💡 25%, 50%, 75% and 100% are your quarter-friends: 1/4, 1/2, 3/4, and 1 whole!</span>`
  },
  {
    level: 'easy',
    text: `A class has 10 students. 5 of them brought their lunch. What percentage of students brought their lunch?`,
    hint: 'Percentage = (part ÷ whole) × 100.',
    choices: ['50%', '5%', '25%', '75%'],
    answer: '50%',
    explanation: `<span class="step">🎒 5 out of 10 students brought lunch.</span><span class="step">📐 Percentage = (part ÷ whole) × 100 = (5 ÷ 10) × 100 = 0.5 × 100 = <strong>50%</strong>.</span><span class="step">💡 5 is exactly half of 10, and half = 50%!</span>`
  },

  // ── MEDIUM (6–15) ─────────────────────────────────────────────────────────
  {
    level: 'medium',
    text: `A pizza has 12 slices. Leo eats 25% of the pizza. How many slices does Leo eat?`,
    hint: '25% = one-quarter. Find one-quarter of 12.',
    choices: ['3 slices', '4 slices', '6 slices', '2 slices'],
    answer: '3 slices',
    explanation: `<span class="step">🍕 Pizza has <strong>12 slices</strong>.</span><span class="step">📐 25% = 1/4. So 12 ÷ 4 = <strong>3 slices</strong>.</span><span class="step">💡 Another way: 10% of 12 = 1.2, 25% = 1.2 × 2.5 = 3. But dividing by 4 is easier!</span>`
  },
  {
    level: 'medium',
    text: `A bookshelf has 40 books. 75% are story books. How many are story books?`,
    hint: '75% = three-quarters. Find 3/4 of 40.',
    choices: ['30 books', '10 books', '20 books', '35 books'],
    answer: '30 books',
    explanation: `<span class="step">📚 There are <strong>40 books</strong>.</span><span class="step">📐 75% = three-quarters = 3/4. First find 1/4: 40 ÷ 4 = 10. Then multiply by 3: 10 × 3 = <strong>30</strong>.</span><span class="step">✅ So 30 books are story books!</span>`
  },
  {
    level: 'medium',
    text: `Emma scored 16 out of 20 on her quiz. What percentage did she score?`,
    hint: 'Percentage = (score ÷ total) × 100.',
    choices: ['80%', '16%', '70%', '60%'],
    answer: '80%',
    explanation: `<span class="step">📝 Emma got <strong>16 out of 20</strong>.</span><span class="step">📐 Percentage = (16 ÷ 20) × 100 = 0.8 × 100 = <strong>80%</strong>.</span><span class="step">💡 Shortcut: 16/20 = 8/10 = 80%. Simplify the fraction first, then convert!</span>`
  },
  {
    level: 'medium',
    text: `A shirt costs $50. It is on sale for 20% off. How much money do you save?`,
    hint: 'Find 20% of $50.',
    choices: ['$10', '$20', '$5', '$40'],
    answer: '$10',
    explanation: `<span class="step">👕 Shirt costs <strong>$50</strong>. Discount is <strong>20%</strong>.</span><span class="step">📐 10% of $50 = $5. So 20% = $5 × 2 = <strong>$10</strong> saved.</span><span class="step">💡 Find 10% first, then double it to get 20%!</span>`
  },
  {
    level: 'medium',
    text: `Ben has 60 cards. He gives 40% to his brother. How many cards does Ben keep?`,
    hint: 'Find 40% first, then subtract from 60.',
    choices: ['36 cards', '24 cards', '40 cards', '20 cards'],
    answer: '36 cards',
    explanation: `<span class="step">🃏 Ben has <strong>60 cards</strong>.</span><span class="step">📐 40% of 60 = (40 ÷ 100) × 60 = 0.4 × 60 = <strong>24 cards</strong> given away.</span><span class="step">➖ Ben keeps: 60 − 24 = <strong>36 cards</strong>.</span><span class="step">💡 Shortcut: he keeps 100% − 40% = 60% of his cards. 60% of 60 = 36!</span>`
  },
  {
    level: 'medium',
    text: `In a class of 25 students, 60% passed the test. How many students passed?`,
    hint: 'Find 60% of 25.',
    choices: ['15 students', '10 students', '20 students', '12 students'],
    answer: '15 students',
    explanation: `<span class="step">🏫 Class has <strong>25 students</strong>.</span><span class="step">📐 60% of 25: first find 10% → 25 ÷ 10 = 2.5. Then multiply by 6 → 2.5 × 6 = <strong>15</strong>.</span><span class="step">✅ <strong>15 students</strong> passed the test!</span>`
  },
  {
    level: 'medium',
    text: `A plant is 50 cm tall. After one month it grows 20% taller. How tall is it now?`,
    hint: 'Find 20% of 50, then add it to 50.',
    choices: ['60 cm', '70 cm', '55 cm', '52 cm'],
    answer: '60 cm',
    explanation: `<span class="step">🌱 Plant is <strong>50 cm</strong> tall.</span><span class="step">📐 20% of 50 = 10 cm growth.</span><span class="step">➕ New height = 50 + 10 = <strong>60 cm</strong>.</span><span class="step">💡 You can also do: 120% of 50 = 1.2 × 50 = 60. Adding the percentage directly!</span>`
  },
  {
    level: 'medium',
    text: `Zara has $40. She saves 25% and spends the rest. How much does she spend?`,
    hint: 'Find how much she saves, then subtract from $40.',
    choices: ['$30', '$10', '$20', '$25'],
    answer: '$30',
    explanation: `<span class="step">💰 Zara has <strong>$40</strong>.</span><span class="step">🏦 She saves 25%: 25% of 40 = $10 saved.</span><span class="step">➖ She spends: 40 − 10 = <strong>$30</strong>.</span><span class="step">💡 She saves 25%, so she spends 75%. And 75% of 40 = 30 — same answer!</span>`
  },
  {
    level: 'medium',
    text: `10 out of 40 apples in a basket are green. What percentage are green?`,
    hint: 'Percentage = (green apples ÷ total apples) × 100.',
    choices: ['25%', '10%', '40%', '30%'],
    answer: '25%',
    explanation: `<span class="step">🍎 <strong>10 green</strong> apples out of <strong>40 total</strong>.</span><span class="step">📐 Percentage = (10 ÷ 40) × 100 = 0.25 × 100 = <strong>25%</strong>.</span><span class="step">💡 10/40 simplifies to 1/4, and 1/4 = 25%!</span>`
  },
  {
    level: 'medium',
    text: `A bag has 80 candies. 35% are chocolate. How many candies are NOT chocolate?`,
    hint: 'Find 35% of 80, then subtract from 80. Or find 65% directly.',
    choices: ['52 candies', '28 candies', '45 candies', '48 candies'],
    answer: '52 candies',
    explanation: `<span class="step">🍬 <strong>80 candies</strong> total, 35% are chocolate.</span><span class="step">📐 Chocolate: 35% of 80 = 0.35 × 80 = 28 candies.</span><span class="step">➖ Not chocolate: 80 − 28 = <strong>52 candies</strong>.</span><span class="step">💡 Shortcut: not chocolate = 100% − 35% = 65%. And 65% of 80 = 52!</span>`
  },

  // ── HARD (16–30) ──────────────────────────────────────────────────────────
  {
    level: 'hard',
    text: `A school has 400 students. 45% are girls. How many boys are there?`,
    hint: 'Find how many girls, then subtract from 400.',
    choices: ['220 boys', '180 boys', '200 boys', '160 boys'],
    answer: '220 boys',
    explanation: `<span class="step">🏫 <strong>400 students</strong> total. 45% are girls.</span><span class="step">📐 Girls: 45% of 400 = 0.45 × 400 = <strong>180 girls</strong>.</span><span class="step">➖ Boys: 400 − 180 = <strong>220 boys</strong>.</span><span class="step">💡 Or: boys = 100% − 45% = 55%. 55% of 400 = 220. Same answer!</span>`
  },
  {
    level: 'hard',
    text: `A jacket costs $120. It is discounted by 25%. What is the sale price?`,
    hint: 'Find 25% of $120, then subtract it.',
    choices: ['$90', '$95', '$80', '$100'],
    answer: '$90',

// ── localStorage helpers ──────────────────────────────────────────────────────
const STORAGE_KEY = 'mathChampions_pct';
const EMPTY_STATS = () => ({ attempts: [], questions: {}, streak: { current: 0, best: 0, lastDate: null } });
function loadStats() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || EMPTY_STATS(); }
  catch { return EMPTY_STATS(); }
}
function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

// ── State ─────────────────────────────────────────────────────────────────────
let current      = 0;
let attempts     = 0;
let scoreCorrect = 0, scoreWrong = 0, scoreDone = 0;
let shuffledChoices = [];
let quizStartTime   = Date.now();
let quizQResults    = new Array(30).fill(null);

// ── Score UI ──────────────────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('score-correct').textContent = scoreCorrect;
  document.getElementById('score-wrong').textContent   = scoreWrong;
  document.getElementById('score-done').textContent    = scoreDone;
  document.getElementById('progress-bar').style.width  = (scoreDone / 30 * 100) + '%';
  document.getElementById('progress-label').textContent =
    current < 30 ? `Question ${current + 1} of 30` : 'All done!';
}

// ── Render one question ───────────────────────────────────────────────────────
function renderQuestion(idx) {
  attempts = 0;
  const q = questions[idx];
  shuffledChoices = [...q.choices].sort(() => Math.random() - 0.5);
  document.getElementById('progress-label').textContent = `Question ${idx + 1} of 30`;

  document.getElementById('main').innerHTML = `
    <div class="card" id="q-card">
      <div class="card-top">
        <span class="q-counter">Question ${idx + 1} of 30</span>
        <span class="badge badge-${q.level}">${q.level}</span>
      </div>
      <div class="q-text">${q.text}</div>
      <div class="choices" id="choices">
        ${shuffledChoices.map((c, i) =>
          `<button class="choice-btn" id="btn-${i}" onclick="handleChoice(${i})">${c}</button>`
        ).join('')}
      </div>
      <div class="feedback"    id="feedback"></div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="next-btn" onclick="goNext()">
        ${idx + 1 < 30 ? 'Next Question →' : 'See My Results'}
      </button>
    </div>`;
}

// ── Handle a choice ───────────────────────────────────────────────────────────
function handleChoice(btnIdx) {
  const q        = questions[current];
  const chosen   = shuffledChoices[btnIdx];
  const feedback = document.getElementById('feedback');
  const explEl   = document.getElementById('explanation');
  const nextBtn  = document.getElementById('next-btn');
  const btn      = document.getElementById(`btn-${btnIdx}`);

  attempts++;
  const isEquivalent = q.equivalents && q.equivalents.includes(chosen);
  const isCorrect    = chosen === q.answer || isEquivalent;

  updatePip(attempts - 1, isCorrect ? 'correct' : 'wrong');

  if (isCorrect) {
    quizQResults[current] = 'first';
    btn.classList.add('state-correct');
    disableAll();
    feedback.textContent = isEquivalent
      ? `🎉 Correct! ${chosen} equals ${q.answer} — great thinking!`
      : '🎉 Correct! Fantastic work!';
    feedback.className = 'feedback show correct';
    showExplanation(explEl, q.explanation);
    nextBtn.classList.add('show');
    scoreCorrect++;
    scoreDone++;
    updateScore();
  } else {
    quizQResults[current] = 'missed';
    btn.classList.add('state-wrong');
    disableAll();
    revealCorrect(q.answer);
    feedback.textContent = `❌ The correct answer is: ${q.answer}`;
    feedback.className = 'feedback show wrong';
    showExplanation(explEl, q.explanation);
    nextBtn.classList.add('show');
    scoreWrong++;
    scoreDone++;
    updateScore();
  }
}

function showExplanation(el, html) {
  el.innerHTML = `<div class="explanation-title">🧮 Here's how to solve it!</div><div class="explanation-body">${html}</div>`;
  el.className = 'explanation show';
}
function disableAll() { document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true); }
function revealCorrect(answer) {
  shuffledChoices.forEach((c, i) => {
    if (c === answer) document.getElementById(`btn-${i}`).classList.add('state-reveal');
  });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goNext() {
  current++;
  if (current >= questions.length) showFinalScreen();
  else renderQuestion(current);
}

// ── Final screen ──────────────────────────────────────────────────────────────
function showFinalScreen() {
  stopTimer();
  saveAttempt();
  document.getElementById('progress-label').textContent = 'All done!';
  const pct     = Math.round((scoreCorrect / 30) * 100);
  const timeStr = formatTime(timerSeconds);
  const isChampion = pct >= 90;
  const tallyTime = `<div class="tally-box"><div class="num">${timeStr}</div><div class="lbl">Time</div></div>`;

  if (isChampion) {
    document.getElementById('main').innerHTML = `
      <div class="final-screen championship-wrap">
        <span class="trophy-cup">🏆</span>
        <div class="champion-title">MATH CHAMPION!</div>
        <div class="champion-subtitle">Incredible — you got ${scoreCorrect} out of 30 correct!</div>
        <div class="final-tally">
          <div class="tally-box green"><div class="num">${scoreCorrect}</div><div class="lbl">Correct</div></div>
          <div class="tally-box red"><div class="num">${scoreWrong}</div><div class="lbl">Wrong</div></div>
          <div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>
          ${tallyTime}

    const emoji = pct >= 70 ? '⭐' : pct >= 50 ? '👍' : '💪';
    const msg   = pct >= 70 ? 'Great job! Keep practicing!'
                : pct >= 50 ? 'Good effort! You can do even better!'
                : 'Keep going — practice makes perfect!';
    document.getElementById('main').innerHTML = `
      <div class="final-screen">
        <h2>${emoji} Quiz Complete!</h2>

          <div class="tally-box"><div class="num">${pct}%</div><div class="lbl">Score</div></div>

// ── Fireworks ─────────────────────────────────────────────────────────────────
function launchFireworks() {
  const canvas = document.createElement('canvas');
  canvas.id = 'fireworks-canvas';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  resize();
  window.addEventListener('resize', resize);
  const COLORS = ['#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#f97316','#ec4899','#facc15'];
  const particles = [];
  function Particle(x, y) {
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 7 + 2;
    return { x, y, color, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      radius: Math.random()*3+1.5, alpha: 1, decay: Math.random()*0.018+0.008, gravity: 0.12 };
  }
  function burst(x, y) { for (let i = 0; i < 70; i++) particles.push(Particle(x, y)); }
  let fired = 0;
  const pos = () => [Math.random()*canvas.width*0.7+canvas.width*0.15, Math.random()*canvas.height*0.55+canvas.height*0.05];
  [0,300,600,900,1200,1600,2000,2400,2800,3200,3600,4000,4400,4800].forEach(d =>
    setTimeout(() => { const [x,y]=pos(); burst(x,y); fired++; }, d));
  let animId;
  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let i = particles.length-1; i >= 0; i--) {
      const p = particles[i];
      p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
      if (p.alpha <= 0) { particles.splice(i,1); continue; }
      ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
      ctx.shadowColor = p.color; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fill(); ctx.restore();
    }
    if (fired < 14 || particles.length > 0) animId = requestAnimationFrame(animate);
    else { cancelAnimationFrame(animId); window.removeEventListener('resize',resize); canvas.remove(); }
  }
  animate();
}

// ── Save attempt ──────────────────────────────────────────────────────────────
function saveAttempt() {
  const stats = loadStats();
  const pct   = Math.round((scoreCorrect / 30) * 100);
  const secs  = Math.round((Date.now() - quizStartTime) / 1000);
  const byLevel = { easy: 0, medium: 0, hard: 0 };
  quizQResults.forEach((r, i) => { if (r === 'first' || r === 'second') byLevel[questions[i].level]++; });
  stats.attempts.push({ date: new Date().toISOString().slice(0,10), score: scoreCorrect, pct, secs, byLevel });
  if (stats.attempts.length > 50) stats.attempts = stats.attempts.slice(-50);
  quizQResults.forEach((r, i) => {
    if (!r) return;
    const k = String(i);
    if (!stats.questions[k]) stats.questions[k] = { seen: 0, firstTry: 0, missed: 0 };
    stats.questions[k].seen++;
    if (r === 'first')  stats.questions[k].firstTry++;
    if (r === 'missed') stats.questions[k].missed++;
  });
  const today     = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
  if      (stats.streak.lastDate === today)      { /* already practiced */ }
  else if (stats.streak.lastDate === yesterday)  { stats.streak.current++; }
  else                                           { stats.streak.current = 1; }
  stats.streak.best     = Math.max(stats.streak.best, stats.streak.current);
  stats.streak.lastDate = today;
  saveStats(stats);
}

// ── Progress panel ────────────────────────────────────────────────────────────
function showProgressPanel() {
  const stats    = loadStats();
  const attempts = stats.attempts;
  const total    = attempts.length;
  const bestPct  = total ? Math.max(...attempts.map(a => a.pct)) : 0;
  const avgPct   = total ? Math.round(attempts.reduce((s,a) => s+a.pct, 0) / total) : 0;
  const streak   = stats.streak;
  const recent   = attempts.slice(-10);
  const barsHtml = recent.map(a => `
    <div class="bar-col">
      <span class="bar-pct-lbl">${a.pct}%</span>
      <div class="bar-fill ${a.pct>=90?'bar-champion':''}" style="height:${a.pct}%"></div>
    </div>`).join('');
  const best = total ? attempts.reduce((b,a) => a.pct>b.pct?a:b) : null;
  const levelHtml = best ? ['easy','medium','hard'].map(lvl => {
    const max   = lvl==='easy'?5:lvl==='medium'?10:15;
    const got   = best.byLevel[lvl]||0;
    const pct   = Math.round(got/max*100);
    const color = lvl==='easy'?'var(--easy)':lvl==='medium'?'var(--medium)':'var(--hard)';
    return `<div class="level-row">
      <span class="level-row-label" style="color:${color}">${lvl.charAt(0).toUpperCase()+lvl.slice(1)}</span>
      <div class="level-track"><div class="level-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="level-pct">${got}/${max}</span></div>`;
  }).join('') : '';
  const weakQ = Object.entries(stats.questions)
    .filter(([,v]) => v.seen>=2 && v.missed>0)
    .sort(([,a],[,b]) => (b.missed/b.seen)-(a.missed/a.seen))
    .slice(0,4);
  const weakHtml = weakQ.map(([idx,v]) => {
    const q = questions[parseInt(idx)];
    const short = q.text.length>65 ? q.text.substring(0,65)+'…' : q.text;
    return `<li class="weak-item"><span style="flex:1">${short}</span><span class="miss-badge">missed ${v.missed}/${v.seen}</span></li>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.className = 'progress-panel';
  overlay.id        = 'progress-panel-overlay';
  overlay.innerHTML = `
    <div class="progress-panel-inner">
      <div class="panel-header">
        <span class="panel-title">📊 My Progress — Percentages</span>
        <button class="panel-close" onclick="closeProgressPanel()">✕</button>
      </div>
      <div class="streak-card">
        <span class="streak-fire">🔥</span>
        <div>
          <div class="streak-num">${streak.current} day${streak.current!==1?'s':''}</div>
          <div class="streak-lbl">Current streak &nbsp;·&nbsp; Best: ${streak.best} day${streak.best!==1?'s':''}</div>
        </div>
      </div>
      <div class="stat-grid">
        <div class="stat-card"><div class="s-num">${total}</div><div class="s-lbl">Quizzes</div></div>
        <div class="stat-card"><div class="s-num">${bestPct}%</div><div class="s-lbl">Best Score</div></div>
        <div class="stat-card"><div class="s-num">${avgPct}%</div><div class="s-lbl">Average</div></div>
      </div>
      ${total===0?'<div class="empty-state">Complete your first quiz to see stats here! 🎯</div>':''}
      ${recent.length?`<div class="panel-section-title">Recent Attempts</div><div class="bar-chart">${barsHtml}</div>`:''}
      ${best?`<div class="panel-section-title">Best Attempt — By Difficulty</div><div class="level-bars">${levelHtml}</div>`:''}
      ${weakHtml?`<div class="panel-section-title">Questions to Practise More</div><ul class="weak-list">${weakHtml}</ul>`:''}
    </div>`;
  overlay.addEventListener('click', e => { if (e.target===overlay) closeProgressPanel(); });
  document.body.appendChild(overlay);
}
function closeProgressPanel() { document.getElementById('progress-panel-overlay')?.remove(); }

// ── Restart ───────────────────────────────────────────────────────────────────
// ── Timer ─────────────────────────────────────────────────────────────────────
let timerInterval = null;
let timerSeconds  = 0;

function startTimer() {
  timerSeconds = 0;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '⏱ 0:00';
  timerInterval = setInterval(() => {
    timerSeconds++;
    document.getElementById('timer').textContent = '⏱ ' + formatTime(timerSeconds);
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function formatTime(s) {
